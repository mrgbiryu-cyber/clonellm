<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | LGE Prototype</title>
    <style>
      body { margin: 0; font-family: Arial, sans-serif; background: #f6f7fb; color: #141821; }
      header { padding: 16px 20px; background: #111827; color: #fff; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
      main { display: grid; grid-template-columns: 320px minmax(0,1fr) 340px; gap: 16px; padding: 16px; }
      .panel { background: #fff; border: 1px solid #e7e9f2; border-radius: 10px; overflow: hidden; }
      .panel h2 { margin: 0; padding: 12px 14px; font-size: 14px; border-bottom: 1px solid #eceef7; }
      .list { max-height: calc(100vh - 140px); overflow: auto; }
      .row { display: block; width: 100%; text-align: left; border: 0; background: #fff; padding: 10px 12px; border-bottom: 1px solid #f1f2f8; cursor: pointer; }
      .row:hover { background: #f7f8ff; }
      .row.active { background: #eef2ff; font-weight: 700; }
      .body { padding: 12px; }
      .section { border: 1px solid #e9ebf5; border-radius: 8px; padding: 10px; margin: 10px 0; background: #fff; }
      .meta { color: #61667a; font-size: 12px; }
      .actions, .toolbar-actions, .component-actions { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
      a.btn, button.btn { background: #1f4dd8; color: #fff; text-decoration: none; padding: 8px 10px; border-radius: 6px; font-size: 13px; border: 0; cursor: pointer; font-weight: 700; }
      button.btn.secondary, a.btn.secondary { background: #475569; }
      .llm { margin-top: 14px; padding-top: 14px; border-top: 1px solid #eceef7; }
      textarea { width: 100%; min-height: 100px; box-sizing: border-box; border: 1px solid #dfe3f0; border-radius: 8px; padding: 10px; font: inherit; resize: vertical; }
      textarea.inline-textarea { min-height: 92px; margin-top: 8px; }
      button.run { margin-top: 8px; border: 0; background: #c60c30; color: #fff; padding: 9px 12px; border-radius: 7px; cursor: pointer; font-weight: 700; }
      .status, .component-status { margin-top: 8px; font-size: 12px; color: #586075; }
      .top-meta { display: flex; align-items: center; gap: 12px; font-size: 12px; color: #cbd5e1; }
      .top-meta button { border: 0; background: #fff; color: #111827; padding: 8px 10px; border-radius: 6px; cursor: pointer; font-weight: 700; }
      .toolbar-actions button { border: 0; background: #111827; color: #fff; padding: 8px 10px; border-radius: 6px; cursor: pointer; font-weight: 700; }
      .list-toolbar { padding: 10px 12px; border-bottom: 1px solid #eceef7; display: flex; flex-wrap: wrap; gap: 6px; }
      .list-filter-btn { border: 1px solid #d9ddea; background: #fff; color: #111827; padding: 6px 8px; border-radius: 999px; cursor: pointer; font-size: 12px; font-weight: 700; }
      .list-filter-btn.active { background: #111827; color: #fff; border-color: #111827; }
      .list-summary { padding: 0 12px 10px; border-bottom: 1px solid #eceef7; }
      .admin-notice { margin: 10px 12px 0; padding: 8px 10px; border-radius: 8px; font-size: 12px; background: #eff6ff; color: #1e3a8a; border: 1px solid #bfdbfe; }
      .admin-notice.error { background: #fef2f2; color: #991b1b; border-color: #fecaca; }
      .progress-track { height: 10px; border-radius: 999px; background: #e5e7eb; overflow: hidden; margin-top: 8px; }
      .progress-fill { height: 100%; background: linear-gradient(90deg, #1f4dd8 0%, #0ea5e9 100%); }
      .toolbar-actions select, .component-card select { border: 1px solid #d9ddea; border-radius: 6px; padding: 7px 8px; background: #fff; }
      .history-list { padding: 12px; display: grid; gap: 8px; }
      .history-item { border: 1px solid #e9ebf5; border-radius: 8px; padding: 10px; background: #fff; }
      .history-item.acceptance-event { border-color: #bfdbfe; background: #f8fbff; }
      .history-item strong { display: block; font-size: 13px; }
      .empty { color: #61667a; font-size: 12px; padding: 12px; }
      .component-grid { display: grid; gap: 10px; margin-top: 14px; }
      .component-card { border: 1px solid #e6e9f4; border-radius: 10px; padding: 12px; background: #fbfcff; }
      .component-card h4 { margin: 0 0 6px; font-size: 13px; }
      .meta-row { display: flex; flex-wrap: wrap; gap: 8px; margin: 6px 0; }
      .chip { display: inline-flex; align-items: center; padding: 4px 8px; border-radius: 999px; font-size: 11px; font-weight: 700; background: #eef2ff; color: #3730a3; }
      .chip.warn { background: #fff7ed; color: #9a3412; }
      .chip.pass { background: #ecfdf5; color: #166534; }
      .chip.fail { background: #fef2f2; color: #991b1b; }
      .gap-list { margin-top: 10px; display: grid; gap: 8px; }
      .gap-item { border: 1px solid #f1d7aa; background: #fffaf0; border-radius: 8px; padding: 8px 10px; }
      .gap-item.acceptance-pass { border-color: #b7e4c7; background: #f3fff7; }
      .gap-item.acceptance-fail { border-color: #fecaca; background: #fff5f5; }
      .gap-item.acceptance-pending { border-color: #fde68a; background: #fffaf0; }
      .gap-item.acceptance-next-target { border-color: #93c5fd; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.16); }
      .gap-item.acceptance-selected-target { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.18); background: #f8fbff; }
      .preview-frame { width: 100%; height: 420px; border: 1px solid #e7e9f2; border-radius: 10px; margin-top: 14px; background: #fff; }
      code { background: #f3f4f6; padding: 1px 4px; border-radius: 4px; }
      @media (max-width: 1200px) {
        main { grid-template-columns: 320px 1fr; }
        .panel.side { grid-column: 1 / -1; }
      }
    </style>
  </head>
  <body>
    <header>
      <strong>LGE Prototype Admin</strong>
      <div class="top-meta">
        <span id="sessionMeta">Loading session...</span>
        <button id="logoutBtn" type="button">로그아웃</button>
      </div>
    </header>
    <main>
      <section class="panel">
        <h2>Pages</h2>
        <div id="pageListToolbar" class="list-toolbar"></div>
        <div id="pageListSummary" class="list-summary"></div>
        <div id="adminNotice" class="admin-notice" hidden></div>
        <div id="pageList" class="list"></div>
      </section>
      <section class="panel">
        <h2>Page Detail</h2>
        <div id="detail" class="body">Loading...</div>
      </section>
      <section class="panel side">
        <h2>Workspace Activity</h2>
        <div id="historyPanel" class="history-list"></div>
      </section>
    </main>
    <script>
      const pageListEl = document.getElementById("pageList");
      const pageListToolbarEl = document.getElementById("pageListToolbar");
      const pageListSummaryEl = document.getElementById("pageListSummary");
      const adminNoticeEl = document.getElementById("adminNotice");
      const detailEl = document.getElementById("detail");
      const sessionMetaEl = document.getElementById("sessionMeta");
      const logoutBtn = document.getElementById("logoutBtn");
      const historyPanelEl = document.getElementById("historyPanel");
      let pages = [];
      let selectedId = "";
      let selectedBundleId = "";
      let workspaceMeta = null;
      let recentActivity = [];
      let finalReadinessMeta = null;
      let pageFilter = "all";
      let activityFilter = "all";
      let advisoryFilter = "all";
      let runtimePageSummary = null;
      let pageAdvisories = {};
      let pageReviewMap = new Map();

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      async function fetchJson(url, options) {
        const response = await fetch(url, options);
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.detail || payload.error || `Request failed: ${url}`);
        }
        return payload;
      }

      let noticeTimer = null;
      function showAdminNotice(message, type = "info") {
        if (!adminNoticeEl) return;
        adminNoticeEl.textContent = String(message || "");
        adminNoticeEl.hidden = !message;
        adminNoticeEl.classList.toggle("error", type === "error");
        if (noticeTimer) {
          window.clearTimeout(noticeTimer);
          noticeTimer = null;
        }
        if (message) {
          noticeTimer = window.setTimeout(() => {
            adminNoticeEl.hidden = true;
            adminNoticeEl.textContent = "";
            adminNoticeEl.classList.remove("error");
          }, 2200);
        }
      }

      function readAdminStateFromUrl() {
        const params = new URLSearchParams(window.location.search);
        selectedId = params.get("pageId") || selectedId || "";
        selectedBundleId = params.get("bundleId") || "";
        pageFilter = params.get("pageFilter") || pageFilter || "all";
        activityFilter = params.get("activityFilter") || activityFilter || "all";
        advisoryFilter = params.get("advisoryFilter") || advisoryFilter || "all";
      }

      function syncAdminStateUrl(mode = "replace") {
        const params = new URLSearchParams();
        if (selectedId) params.set("pageId", selectedId);
        if (selectedBundleId) params.set("bundleId", selectedBundleId);
        if (pageFilter && pageFilter !== "all") params.set("pageFilter", pageFilter);
        if (activityFilter && activityFilter !== "all") params.set("activityFilter", activityFilter);
        if (advisoryFilter && advisoryFilter !== "all") params.set("advisoryFilter", advisoryFilter);
        const nextUrl = `${window.location.pathname}${params.toString() ? `?${params.toString()}` : ""}`;
        if (mode === "push") {
          window.history.pushState({}, "", nextUrl);
          return;
        }
        window.history.replaceState({}, "", nextUrl);
      }

      function renderHistoryPanel() {
        const historyItems = Array.isArray(workspaceMeta?.workHistory) ? workspaceMeta.workHistory : [];
        const activityItems = Array.isArray(recentActivity) ? recentActivity : [];
        const bundleDefinitionMap = new Map((acceptanceBundles?.bundles || []).map((bundle) => [bundle.bundleId, bundle]));
        const visibleActivityItems = activityFilter === "acceptance"
          ? activityItems.filter((item) => item.type === "acceptance_result_saved")
          : activityItems;
        if (!historyItems.length && !activityItems.length) {
          historyPanelEl.innerHTML = `<div class="empty">No activity yet.</div>`;
          return;
        }
        historyPanelEl.innerHTML = `
          <div>
            <div class="meta"><strong>Workspace History</strong></div>
            ${historyItems.length ? historyItems.slice(0, 10).map((item) => `
              <div class="history-item">
                <strong>${escapeHtml(item.summary)}</strong>
                <div class="meta">${escapeHtml(item.recordedAt || "")}</div>
              </div>
            `).join("") : `<div class="empty">No workspace saves.</div>`}
          </div>
          <div>
            <div class="actions" style="margin-top:0;">
              <div class="meta"><strong>Recent Activity</strong></div>
              <button type="button" class="list-filter-btn ${activityFilter === "all" ? "active" : ""}" data-activity-filter="all">All</button>
              <button type="button" class="list-filter-btn ${activityFilter === "acceptance" ? "active" : ""}" data-activity-filter="acceptance">Acceptance</button>
            </div>
            ${visibleActivityItems.length ? visibleActivityItems.slice(0, 12).map((item) => `
              <div class="history-item ${item.type === "acceptance_result_saved" ? "acceptance-event" : ""}">
                <strong>${escapeHtml(item.type)}</strong>
                <div class="meta">${escapeHtml(item.recordedAt || "")}</div>
                <div class="meta">${escapeHtml(JSON.stringify(item.detail || {}))}</div>
                ${item.type === "acceptance_result_saved" && item.detail?.pageId && item.detail?.bundleId ? `<div class="actions"><button type="button" class="btn secondary activity-page-btn" data-jump-page-id="${escapeHtml(item.detail.pageId)}">Go To Page</button><button type="button" class="btn secondary activity-jump-btn" data-jump-page-id="${escapeHtml(item.detail.pageId)}" data-jump-bundle-id="${escapeHtml(item.detail.bundleId)}">Go To Bundle</button><button type="button" class="btn secondary activity-copy-page-btn" data-copy-page-id="${escapeHtml(item.detail.pageId)}">Copy Page Link</button><button type="button" class="btn secondary activity-copy-btn" data-copy-page-id="${escapeHtml(item.detail.pageId)}" data-copy-bundle-id="${escapeHtml(item.detail.bundleId)}">Copy Bundle Link</button>${pageReviewMap.get(item.detail.pageId)?.compareUrl ? `<a class="btn secondary" href="${escapeHtml(pageReviewMap.get(item.detail.pageId).compareUrl)}" target="_blank">Open Page Compare</a>` : ``}${bundleDefinitionMap.get(item.detail.bundleId)?.review?.compareUrl ? `<a class="btn secondary" href="${escapeHtml(bundleDefinitionMap.get(item.detail.bundleId).review.compareUrl)}" target="_blank">Open Bundle Compare</a>` : ``}</div>` : ``}
              </div>
            `).join("") : `<div class="empty">No activity log.</div>`}
          </div>
        `;
        historyPanelEl.querySelectorAll("[data-activity-filter]").forEach((button) => {
          button.addEventListener("click", () => {
            activityFilter = button.getAttribute("data-activity-filter") || "all";
            syncAdminStateUrl("push");
            renderHistoryPanel();
          });
        });
        historyPanelEl.querySelectorAll(".activity-jump-btn").forEach((button) => {
          button.addEventListener("click", async () => {
            const targetPageId = button.getAttribute("data-jump-page-id") || "";
            const targetBundleId = button.getAttribute("data-jump-bundle-id") || "";
            await navigateToBundle(targetPageId, targetBundleId);
          });
        });
        historyPanelEl.querySelectorAll(".activity-page-btn").forEach((button) => {
          button.addEventListener("click", async () => {
            const targetPageId = button.getAttribute("data-jump-page-id") || "";
            await navigateToBundle(targetPageId, "");
          });
        });
        historyPanelEl.querySelectorAll(".activity-copy-page-btn").forEach((button) => {
          button.addEventListener("click", async () => {
            const targetPageId = button.getAttribute("data-copy-page-id") || "";
            try {
              await copyAdminLinkFor(targetPageId, "");
              showAdminNotice(`Page link copied: ${targetPageId}`);
            } catch (error) {
              console.error(error);
              showAdminNotice("Copy failed", "error");
            }
          });
        });
        historyPanelEl.querySelectorAll(".activity-copy-btn").forEach((button) => {
          button.addEventListener("click", async () => {
            const targetPageId = button.getAttribute("data-copy-page-id") || "";
            const targetBundleId = button.getAttribute("data-copy-bundle-id") || "";
            try {
              await copyAdminLinkFor(targetPageId, targetBundleId);
              showAdminNotice(`Bundle link copied: ${targetBundleId}`);
            } catch (error) {
              console.error(error);
              showAdminNotice("Copy failed", "error");
            }
          });
        });
      }

      function findNextActionablePageId(excludePageId = "") {
        const states = (finalReadinessMeta?.pages || [])
          .filter((item) => item.pageId !== excludePageId)
          .filter((item) => item.acceptanceStatus === "needs-review" || item.acceptanceStatus === "in-progress")
          .sort((a, b) => {
            const acceptanceOrder = { "needs-review": 0, "in-progress": 1, accepted: 2 };
            const ar = acceptanceOrder[a.acceptanceStatus || "in-progress"] ?? 9;
            const br = acceptanceOrder[b.acceptanceStatus || "in-progress"] ?? 9;
            if (ar !== br) return ar - br;
            const riskDiff = Number(b.maxRiskScore || 0) - Number(a.maxRiskScore || 0);
            if (riskDiff !== 0) return riskDiff;
            const fallbackDiff = Number(b.fallbackComponentCount || 0) - Number(a.fallbackComponentCount || 0);
            if (fallbackDiff !== 0) return fallbackDiff;
            const pendingDiff = Number(b.acceptanceCounts?.pending || 0) - Number(a.acceptanceCounts?.pending || 0);
            if (pendingDiff !== 0) return pendingDiff;
            return String(a.pageId || "").localeCompare(String(b.pageId || ""), "ko");
          });
        return states[0]?.pageId || "";
      }

      function getPageAdvisoryMeta(pageId) {
        const items = Array.isArray(pageAdvisories?.[pageId]) ? pageAdvisories[pageId] : [];
        const severityRank = { error: 3, warning: 2, info: 1 };
        const highestSeverity = items.reduce((current, item) => {
          const nextSeverity = String(item?.severity || "info");
          return (severityRank[nextSeverity] || 0) > (severityRank[current] || 0) ? nextSeverity : current;
        }, "");
        return {
          count: items.length,
          highestSeverity: highestSeverity || "none",
        };
      }

      function buildPageReviewMap(visualManifest) {
        const nextMap = new Map();
        if (visualManifest?.home) {
          nextMap.set("home", visualManifest.home);
        }
        for (const item of visualManifest?.servicePages || []) {
          if (item?.pageId) nextMap.set(item.pageId, item);
        }
        for (const item of visualManifest?.plpPages || []) {
          if (item?.pageId) nextMap.set(item.pageId, item);
        }
        return nextMap;
      }

      async function refreshData(options = {}) {
        const [session, data, activity, finalReadiness, visualManifest] = await Promise.all([
          fetchJson("/api/auth/session"),
          fetchJson("/api/data"),
          fetchJson("/api/activity?limit=20"),
          fetchJson("/api/workspace/final-readiness"),
          fetchJson("/api/visual-review-manifest"),
        ]);
        if (!session?.authenticated) {
          location.href = "/login";
          return;
        }
        sessionMetaEl.textContent = `${session.user?.displayName || session.user?.loginId} · ${data.workspaceSource || "shared-default"}`;
        workspaceMeta = data.workspaceMeta || null;
        recentActivity = activity.items || [];
        finalReadinessMeta = finalReadiness || null;
        runtimePageSummary = data.runtimePageSummary || null;
        pageAdvisories = data.pageAdvisories || {};
        pageReviewMap = buildPageReviewMap(visualManifest || null);
        const acceptanceOrder = { "needs-review": 0, "in-progress": 1, "accepted": 2 };
        const pageAcceptanceMap = new Map((finalReadinessMeta?.pages || []).map((item) => [item.pageId, item]));
        pages = (data.pages || []).slice().sort((a, b) => {
          const aa = pageAcceptanceMap.get(a.id) || {};
          const bb = pageAcceptanceMap.get(b.id) || {};
          const ar = acceptanceOrder[aa.acceptanceStatus || "in-progress"] ?? 9;
          const br = acceptanceOrder[bb.acceptanceStatus || "in-progress"] ?? 9;
          if (ar !== br) return ar - br;
          const riskDiff = Number(bb.maxRiskScore || 0) - Number(aa.maxRiskScore || 0);
          if (riskDiff !== 0) return riskDiff;
          const fallbackDiff = Number(bb.fallbackComponentCount || 0) - Number(aa.fallbackComponentCount || 0);
          if (fallbackDiff !== 0) return fallbackDiff;
          const ap = Number(aa.acceptanceCounts?.pending || 0);
          const bp = Number(bb.acceptanceCounts?.pending || 0);
          if (ap !== bp) return bp - ap;
          return String(a.title || a.id).localeCompare(String(b.title || b.id), "ko");
        });
        if (!pages.find((page) => page.id === selectedId)) {
          selectedId = pages[0] ? pages[0].id : "";
          selectedBundleId = "";
        }
        syncAdminStateUrl();
        renderList();
        if (!options.skipDetail) {
          await renderDetail();
        }
        renderHistoryPanel();
      }

      function renderList() {
        const pageAcceptanceMap = new Map((finalReadinessMeta?.pages || []).map((item) => [item.pageId, item]));
        const overallTotal = Number(finalReadinessMeta?.acceptance?.total || 0);
        const overallPass = Number(finalReadinessMeta?.acceptance?.pass || 0);
        const nextPageId = finalReadinessMeta?.nextActionablePageId || findNextActionablePageId("");
        const completionRate = overallTotal > 0 ? Math.round((overallPass / overallTotal) * 100) : 0;
        const counts = runtimePageSummary?.counts || {};
        const advisorySummary = {
          total: Number(finalReadinessMeta?.pageAdvisoryCount || 0),
          warningPages: Number(finalReadinessMeta?.warningPageCount || 0),
          errorPages: Number(finalReadinessMeta?.errorPageCount || 0),
        };
        const filters = [
          { id: "all", label: "All" },
          { id: "pending", label: "Pending" },
          { id: "fail", label: "Fail" },
          { id: "accepted", label: "Accepted" },
        ];
        const advisoryFilters = [
          { id: "all", label: "All Advisories" },
          { id: "warning", label: "Warning+" },
          { id: "error", label: "Error" },
          { id: "has-advisory", label: "Has Advisory" },
        ];
        pageListToolbarEl.innerHTML = `
          <div class="actions" style="margin-top:0;">
            ${filters.map((filter) => `
              <button class="list-filter-btn ${pageFilter === filter.id ? "active" : ""}" type="button" data-filter="${escapeHtml(filter.id)}">${escapeHtml(filter.label)}</button>
            `).join("")}
          </div>
          <div class="actions" style="margin-top:0;">
            ${advisoryFilters.map((filter) => `
              <button class="list-filter-btn ${advisoryFilter === filter.id ? "active" : ""}" type="button" data-advisory-filter="${escapeHtml(filter.id)}">${escapeHtml(filter.label)}</button>
            `).join("")}
          </div>
        `;
        pageListToolbarEl.querySelectorAll("[data-filter]").forEach((button) => {
          button.addEventListener("click", () => {
            pageFilter = button.getAttribute("data-filter") || "all";
            const visiblePages = getVisiblePages();
            if (!visiblePages.find((page) => page.id === selectedId)) {
              selectedId = visiblePages[0]?.id || pages[0]?.id || "";
              selectedBundleId = "";
            }
            syncAdminStateUrl("push");
            renderList();
            renderDetail();
          });
        });
        pageListToolbarEl.querySelectorAll("[data-advisory-filter]").forEach((button) => {
          button.addEventListener("click", () => {
            advisoryFilter = button.getAttribute("data-advisory-filter") || "all";
            const visiblePages = getVisiblePages();
            if (!visiblePages.find((page) => page.id === selectedId)) {
              selectedId = visiblePages[0]?.id || pages[0]?.id || "";
              selectedBundleId = "";
            }
            syncAdminStateUrl("push");
            renderList();
            renderDetail();
          });
        });
        pageListSummaryEl.innerHTML = `
          <div class="meta">runtime pages: ${escapeHtml(runtimePageSummary?.totalRuntimePages || 0)} | core ${escapeHtml(counts.corePages || 0)} | info ${escapeHtml(counts.infoPages || 0)} | plp ${escapeHtml(counts.plpPages || 0)} | pdp route ${escapeHtml(counts.pdpRoutes || 0)}</div>
          <div class="meta">overall acceptance: ${escapeHtml(finalReadinessMeta?.acceptance?.pass || 0)} / ${escapeHtml(finalReadinessMeta?.acceptance?.total || 0)} pass | llm gate: ${escapeHtml(finalReadinessMeta?.llmGateStatus || "pending")}</div>
          <div class="meta">fallback components: ${escapeHtml(finalReadinessMeta?.fallbackComponentCount || 0)} | advisories: ${escapeHtml(finalReadinessMeta?.advisoryComponentCount || 0)}</div>
          <div class="meta">page advisories: ${escapeHtml(advisorySummary.total)} | warning pages: ${escapeHtml(advisorySummary.warningPages)} | error pages: ${escapeHtml(advisorySummary.errorPages)}</div>
          <div class="meta">next actionable page: ${escapeHtml(nextPageId || "none")}</div>
          ${finalReadinessMeta?.nextAcceptanceTarget ? `<div class="meta">next acceptance target: <code>${escapeHtml(finalReadinessMeta.nextAcceptanceTarget.bundleId)}</code> (${escapeHtml(finalReadinessMeta.nextAcceptanceTarget.title)}) | advisory ${escapeHtml(finalReadinessMeta.nextAcceptanceTarget.bundleContext?.pageAdvisoryCount || 0)} (${escapeHtml(finalReadinessMeta.nextAcceptanceTarget.bundleContext?.pageAdvisorySeverity || "none")}) | risk ${escapeHtml(finalReadinessMeta.nextAcceptanceTarget.bundleContext?.riskScore || 0)}</div>` : `<div class="meta">next acceptance target: none</div>`}

      function getVisiblePages() {

          if (pageFilter === "accepted" && status !== "accepted") return false;
          if (pageFilter === "fail" && status !== "needs-review") return false;
          if (pageFilter === "pending" && status !== "in-progress") return false;
          if (advisoryFilter === "warning" && !["warning", "error"].includes(advisory.highestSeverity)) return false;
          if (advisoryFilter === "error" && advisory.highestSeverity !== "error") return false;
          if (advisoryFilter === "has-advisory" && Number(advisory.count || 0) <= 0) return false;
          return true;
        });

      function focusNextPendingBundle(bundleId) {
        if (!bundleId) return;
        const target = detailEl.querySelector(`[data-acceptance-bundle-card="${CSS.escape(bundleId)}"]`);
        if (!target) return;
        target.classList.add("acceptance-next-target");
        try {
          target.scrollIntoView({ behavior: "smooth", block: "center" });
        } catch {
          target.scrollIntoView();
        }
        const compareLink = target.querySelector("[data-acceptance-compare-link]");
        const statusSelect = target.querySelector(".acceptance-status-select");
        const focusTarget = compareLink || statusSelect;
        if (focusTarget && typeof focusTarget.focus === "function") {
          window.setTimeout(() => {
            try {
              focusTarget.focus({ preventScroll: true });
            } catch {
              focusTarget.focus();
            }
          }, 120);
        }
        window.setTimeout(() => {
          target.classList.remove("acceptance-next-target");
        }, 2200);
      }

      async function navigateToBundle(pageId, bundleId) {
        if (!pageId) return;
        selectedId = pageId;

        syncAdminStateUrl("push");
        renderList();
        await renderDetail();
        if (bundleId && selectedId === pageId) {
          focusNextPendingBundle(bundleId);
        }
      }

      function buildAdminStateUrl(pageId, bundleId) {
        const url = new URL(window.location.href);
        url.searchParams.set("pageId", pageId || selectedId || "");
        if (bundleId || selectedBundleId) {
          url.searchParams.set("bundleId", bundleId || selectedBundleId);
        } else {
          url.searchParams.delete("bundleId");
        }
        url.searchParams.set("pageFilter", pageFilter || "all");
        url.searchParams.set("activityFilter", activityFilter || "all");
        url.searchParams.set("advisoryFilter", advisoryFilter || "all");
        return url.toString();
      }

      async function copyCurrentAdminLink() {
        const text = buildAdminStateUrl();
        await copyText(text);
        return text;
      }

      async function copyAdminLinkFor(pageId, bundleId) {
        const text = buildAdminStateUrl(pageId, bundleId);
        await copyText(text);
        return text;
      }

      async function copyText(text) {
        if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(text);
          return text;
        }
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.setAttribute("readonly", "readonly");
        textarea.style.position = "absolute";
        textarea.style.left = "-9999px";
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        textarea.remove();
        return text;
      }

      async function saveAcceptanceDecision({ bundleId, status, note, statusEl, currentPageId }) {
        if (!bundleId || !statusEl) return;
        if (status === "fail" && !String(note || "").trim()) {
          statusEl.textContent = "Fail note is required";
          showAdminNotice("Fail note is required", "error");
          return;
        }
        statusEl.textContent = "Saving acceptance...";
        await fetchJson("/api/workspace/acceptance-result", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            bundleId,
            status,
            note: note || "",
          }),
        });
        await refreshData({ skipDetail: true });
        const currentPageState = (finalReadinessMeta?.pages || []).find((item) => item.pageId === currentPageId);
        if (status === "pass" && currentPageState?.acceptanceStatus === "accepted") {
          selectedId = findNextActionablePageId(currentPageId) || selectedId;
          selectedBundleId = "";
        }
        syncAdminStateUrl();
        renderList();
        await renderDetail();
        const nextPendingBundleId =
          selectedId === currentPageId
            ? (detailEl.querySelector('[data-next-pending-bundle-id]')?.getAttribute('data-next-pending-bundle-id') || "")
            : "";
        if (nextPendingBundleId) {
          selectedBundleId = nextPendingBundleId;
          syncAdminStateUrl();
          focusNextPendingBundle(nextPendingBundleId);
        } else if (selectedId === currentPageId) {
          selectedBundleId = "";
          syncAdminStateUrl();
        }
        showAdminNotice(`Acceptance saved: ${bundleId} -> ${status}`);
      }

            try {
              const payload = await fetchJson(`/api/workspace/component-patches?pageId=${encodeURIComponent(pageId)}&componentId=${encodeURIComponent(componentId)}&sourceId=${encodeURIComponent(sourceSelect.value)}`);
              patchEl.value = payload.patch ? JSON.stringify(payload.patch, null, 2) : "";
              componentStatusEl.textContent = payload.patch ? "Patch loaded" : "No patch saved";
            } catch (error) {
              componentStatusEl.textContent = "Load failed: " + String(error);
            }
          });

          card.querySelector(".apply-patch-btn")?.addEventListener("click", async () => {
            let patch = {};
            try {
              patch = patchEl.value.trim() ? JSON.parse(patchEl.value) : {};
            } catch (error) {
              componentStatusEl.textContent = "Patch JSON invalid";
              return;
            }
            componentStatusEl.textContent = "Applying patch...";
            try {
              const payload = await fetchJson("/api/workspace/component-patch", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ pageId, componentId, sourceId: sourceSelect.value, patch }),
              });
              patchEl.value = JSON.stringify(payload.patch || {}, null, 2);
              componentStatusEl.textContent = "Patch applied";
              await renderDetail();
            } catch (error) {
              componentStatusEl.textContent = "Patch failed: " + String(error);
            }
          });
        });

        detailEl.querySelectorAll("[data-acceptance-bundle]").forEach((row) => {
          const bundleId = row.getAttribute("data-acceptance-bundle");
          const statusSelect = row.querySelector(".acceptance-status-select");
          const noteEl = row.parentElement?.querySelector(".acceptance-note");
          const statusEl = row.parentElement?.querySelector(".acceptance-status");
          const runAcceptanceSave = async (status) => {
            if (!bundleId || !statusEl) return;
            await saveAcceptanceDecision({
              bundleId,
              status,
              note: noteEl?.value || "",
              statusEl,
              currentPageId,
            });
          };
          row.parentElement?.querySelectorAll(".acceptance-note-preset-btn").forEach((button) => {
            button.addEventListener("click", () => {
              if (!noteEl || !statusSelect) return;
              const preset = button.getAttribute("data-note-preset") || "";
              noteEl.value = preset;
              statusSelect.value = "fail";
              statusEl.textContent = `Preset selected: ${preset}`;
            });
            button.addEventListener("dblclick", async () => {
              if (!noteEl || !statusSelect) return;
              const preset = button.getAttribute("data-note-preset") || "";
              noteEl.value = preset;
              statusSelect.value = "fail";
              try {
                await runAcceptanceSave("fail");
              } catch (error) {
                statusEl.textContent = "Acceptance failed: " + String(error);
              }
            });
          });
          row.querySelector(".save-acceptance-btn")?.addEventListener("click", async () => {
            if (!bundleId || !statusSelect || !statusEl) return;
            try {
              await runAcceptanceSave(statusSelect.value);
            } catch (error) {
              statusEl.textContent = "Acceptance failed: " + String(error);
            }
          });
          row.querySelector(".pass-next-acceptance-btn")?.addEventListener("click", async () => {
            if (!bundleId || !statusSelect || !statusEl) return;
            statusSelect.value = "pass";
            try {
              await runAcceptanceSave("pass");
            } catch (error) {
              statusEl.textContent = "Acceptance failed: " + String(error);
            }
          });
          row.querySelector(".fail-save-acceptance-btn")?.addEventListener("click", async () => {
            if (!bundleId || !statusSelect || !statusEl) return;
            statusSelect.value = "fail";
            try {
              await runAcceptanceSave("fail");
            } catch (error) {
              statusEl.textContent = "Acceptance failed: " + String(error);
            }
          });
          noteEl?.addEventListener("keydown", async (event) => {
            if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
              event.preventDefault();
              try {
                await runAcceptanceSave(statusSelect?.value || "pending");
              } catch (error) {
                statusEl.textContent = "Acceptance failed: " + String(error);
              }
              return;
            }
            if (event.altKey && event.key === "Enter") {
              event.preventDefault();
              if (statusSelect) statusSelect.value = "pass";
              try {
                await runAcceptanceSave("pass");
              } catch (error) {
                statusEl.textContent = "Acceptance failed: " + String(error);
              }
              return;
            }
            if (event.shiftKey && event.key === "Enter") {
              event.preventDefault();
              if (statusSelect) statusSelect.value = "fail";
              try {
                await runAcceptanceSave("fail");
              } catch (error) {
                statusEl.textContent = "Acceptance failed: " + String(error);
              }
            }
          });
        });

        detailEl.querySelectorAll(".jump-acceptance-target-btn").forEach((button) => {
          button.addEventListener("click", async () => {
            const targetPageId = button.getAttribute("data-jump-page-id") || "";
            const targetBundleId = button.getAttribute("data-jump-bundle-id") || "";
            await navigateToBundle(targetPageId, targetBundleId);
          });
        });
        detailEl.querySelector("#copyDetailStateBtn")?.addEventListener("click", async () => {
          try {
            await copyCurrentAdminLink();
            showAdminNotice("Page link copied");
          } catch (error) {
            console.error(error);
            showAdminNotice("Copy failed", "error");
          }
        });
        detailEl.querySelectorAll(".review-copy-btn").forEach((button) => {
          button.addEventListener("click", async () => {
            const text = button.getAttribute("data-copy-text") || "";
            const label = button.getAttribute("data-copy-label") || "Review link";
            if (!text) return;
            try {
              await copyText(text);
              showAdminNotice(`${label} copied`);
            } catch (error) {
              console.error(error);
              showAdminNotice("Copy failed", "error");
            }
          });
        });
        detailEl.querySelector("#copySelectedBundleBtn")?.addEventListener("click", async () => {
          if (!selectedBundleId) return;
          try {
            await copyAdminLinkFor(currentPageId, selectedBundleId);
            showAdminNotice(`Bundle link copied: ${selectedBundleId}`);
          } catch (error) {
            console.error(error);
            showAdminNotice("Copy failed", "error");
          }
        });
        detailEl.querySelector("#focusSelectedBundleBtn")?.addEventListener("click", () => {
          if (!selectedBundleId) return;
          focusNextPendingBundle(selectedBundleId);
        });
        detailEl.querySelector("#clearDetailBundleTargetBtn")?.addEventListener("click", async () => {
          selectedBundleId = "";
          syncAdminStateUrl("push");
          renderList();
          await renderDetail();
          showAdminNotice("Bundle target cleared");
        });
        detailEl.querySelector("#focusNextPendingBtn")?.addEventListener("click", () => {
          focusCurrentNextPendingBundle();
        });
        detailEl.querySelector("#jumpNextPendingPageBtn")?.addEventListener("click", async () => {
          await navigateToBundle(currentPageId, "");
        });
        detailEl.querySelector("#copyNextPendingPageBtn")?.addEventListener("click", async () => {
          try {
            await copyAdminLinkFor(currentPageId, "");
            showAdminNotice(`Page link copied: ${currentPageId}`);
          } catch (error) {
            console.error(error);
            showAdminNotice("Copy failed", "error");
          }
        });
        detailEl.querySelector("#copyNextPendingBtn")?.addEventListener("click", async () => {
          const targetBundleId = acceptanceResults?.nextPendingBundle?.bundleId || "";
          if (!targetBundleId) return;
          try {
            await copyAdminLinkFor(currentPageId, targetBundleId);
            showAdminNotice(`Bundle link copied: ${targetBundleId}`);
          } catch (error) {
            console.error(error);
            showAdminNotice("Copy failed", "error");
          }
        });
        detailEl.querySelectorAll(".copy-bundle-link-btn").forEach((button) => {
          button.addEventListener("click", async () => {
            const targetPageId = button.getAttribute("data-copy-page-id") || "";
            const targetBundleId = button.getAttribute("data-copy-bundle-id") || "";
            try {
              await copyAdminLinkFor(targetPageId, targetBundleId);
              showAdminNotice(`Bundle link copied: ${targetBundleId}`);
            } catch (error) {
              console.error(error);
              showAdminNotice("Copy failed", "error");
            }
          });
        });
        detailEl.querySelectorAll(".jump-page-btn").forEach((button) => {
          button.addEventListener("click", async () => {
            const targetPageId = button.getAttribute("data-jump-page-id") || "";
            const targetBundleId = button.getAttribute("data-jump-bundle-id") || "";
            await navigateToBundle(targetPageId, targetBundleId);
          });
        });

        const nextPendingBundleId = acceptanceResults?.nextPendingBundle?.bundleId || "";
        const bundleIdToFocus = selectedBundleId || nextPendingBundleId;
        if (bundleIdToFocus) {
          window.setTimeout(() => {
            focusNextPendingBundle(bundleIdToFocus);
          }, 20);
        }
        if (nextPendingBundleId) {
          const marker = document.createElement("div");
          marker.hidden = true;
          marker.setAttribute("data-next-pending-bundle-id", nextPendingBundleId);
          detailEl.appendChild(marker);
        }
      }

      logoutBtn.addEventListener("click", async () => {
        await fetch("/api/auth/logout", { method: "POST" });
        location.href = "/login";
      });

      window.addEventListener("popstate", async () => {
        readAdminStateFromUrl();
        await refreshData();
      });

      readAdminStateFromUrl();
      refreshData().catch((error) => {
        detailEl.textContent = "Failed to load data: " + String(error);
      });
    </script>
  </body>
</html>
