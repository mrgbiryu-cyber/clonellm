      function textToLines(value) {
        return String(value || "")
          .split(/\r?\n/)

          .filter(Boolean);

      function containsBrokenNarrativeText(value = "") {
        return String(value || "").includes("�");
      }

      function normalizeNarrativeLine(value = "") {
        const text = String(value || "")
          .replace(/�+/g, " ")
          .replace(/\s+/g, " ")
          .trim();
        if (!text) return "";
        if (containsBrokenNarrativeText(text)) return "";
        return text;
      }

      function tokenizeNarrativeLine(value = "") {
        return normalizeNarrativeLine(value)
          .toLowerCase()
          .replace(/[`"'“”‘’.,:;!?()[\]{}<>|/\\_-]+/g, " ")
          .split(/\s+/)
          .map((item) => item.trim())
          .filter((item) => item.length >= 2);
      }

      function narrativeLineSimilarity(left = "", right = "") {
        const leftTokens = tokenizeNarrativeLine(left);
        const rightTokens = tokenizeNarrativeLine(right);
        if (!leftTokens.length || !rightTokens.length) return 0;
        const leftSet = new Set(leftTokens);
        const rightSet = new Set(rightTokens);
        let intersection = 0;
        leftSet.forEach((token) => {
          if (rightSet.has(token)) intersection += 1;
        });
        const union = new Set([...leftSet, ...rightSet]).size;
        return union ? intersection / union : 0;
      }

      function uniqueNarrativeLines(values = []) {
        const lines = Array.isArray(values) ? values : [];
        const next = [];
        for (const item of lines) {
          const normalized = normalizeNarrativeLine(item);
          if (!normalized) continue;
          if (next.some((existing) => existing === normalized || narrativeLineSimilarity(existing, normalized) >= 0.82)) {
            continue;
          }
          next.push(normalized);
        }
        return next;
      }

      function shouldPreferGeneratedDoc(rawDoc = "") {
        const text = String(rawDoc || "").trim();
        if (!text) return true;
        if (containsBrokenNarrativeText(text)) return true;
        if (text.length > 9000) return true;
        return false;
      }

            return reason ? `${target} | ${reason}` : target;

      function renderInlineMarkdown(text = "") {
        return escapeHtml(text)
          .replace(/`([^`]+)`/g, "<code>$1</code>")
          .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      }

      function renderMarkdownPreview(markdown = "") {
        const lines = String(markdown || "").replace(/\r/g, "").split("\n");
        const html = [];
        let listItems = [];
        let orderedListItems = [];
        let codeLines = [];
        let inCode = false;
        const flushList = () => {
          if (!listItems.length) return;
          html.push(`<ul>${listItems.map((item) => `<li>${item}</li>`).join("")}</ul>`);
          listItems = [];
        };
        const flushOrderedList = () => {
          if (!orderedListItems.length) return;
          html.push(`<ol>${orderedListItems.map((item) => `<li>${item}</li>`).join("")}</ol>`);
          orderedListItems = [];
        };
        const flushCode = () => {
          if (!codeLines.length) return;
          html.push(`<pre><code>${escapeHtml(codeLines.join("\n"))}</code></pre>`);
          codeLines = [];
        };
        for (const rawLine of lines) {
          const line = String(rawLine || "");
          if (/^```/.test(line.trim())) {
            flushList();
            flushOrderedList();
            if (inCode) flushCode();
            inCode = !inCode;
            continue;
          }
          if (inCode) {
            codeLines.push(line);
            continue;
          }
          if (!line.trim()) {
            flushList();
            flushOrderedList();
            continue;
          }
          if (/^>\s+/.test(line)) {
            flushList();
            flushOrderedList();
            html.push(`<blockquote>${renderInlineMarkdown(line.replace(/^>\s+/, ""))}</blockquote>`);
            continue;
          }
          if (/^###\s+/.test(line)) {
            flushList();
            flushOrderedList();
            html.push(`<h3>${renderInlineMarkdown(line.replace(/^###\s+/, ""))}</h3>`);
            continue;
          }
          if (/^##\s+/.test(line)) {
            flushList();
            flushOrderedList();
            html.push(`<h2>${renderInlineMarkdown(line.replace(/^##\s+/, ""))}</h2>`);
            continue;
          }
          if (/^#\s+/.test(line)) {
            flushList();
            flushOrderedList();
            html.push(`<h1>${renderInlineMarkdown(line.replace(/^#\s+/, ""))}</h1>`);
            continue;
          }
          if (/^- /.test(line)) {
            flushOrderedList();
            listItems.push(renderInlineMarkdown(line.replace(/^- /, "")));
            continue;
          }
          if (/^\d+\.\s+/.test(line)) {
            flushList();
            orderedListItems.push(renderInlineMarkdown(line.replace(/^\d+\.\s+/, "")));
            continue;
          }
          flushList();
          flushOrderedList();
          html.push(`<p>${renderInlineMarkdown(line)}</p>`);
        }
        flushList();
        flushOrderedList();
        if (inCode) flushCode();
        return html.join("");
      }

      function buildProposalSectionSpecsClient(requirementPlan = {}, options = {}) {
        const builderBrief = requirementPlan?.builderBrief && typeof requirementPlan.builderBrief === "object" ? requirementPlan.builderBrief : {};
        const orderedSlotIds = Array.from(new Set([
          ...(Array.isArray(builderBrief.suggestedFocusSlots) ? builderBrief.suggestedFocusSlots.map((item) => String(item || "").trim()).filter(Boolean) : []),
          ...((Array.isArray(requirementPlan?.priority) ? requirementPlan.priority : []).map((item) => String(item?.target || "").trim()).filter(Boolean)),
        ])).slice(0, 8);
        const requestSummary = uniqueNarrativeLines(textToLines(linesToText(requirementPlan?.requestSummary || [])));
        const planningDirection = uniqueNarrativeLines(textToLines(linesToText(requirementPlan?.planningDirection || [])));
        const designDirection = uniqueNarrativeLines(textToLines(linesToText(requirementPlan?.designDirection || [])));
        const mustKeep = uniqueNarrativeLines(textToLines(linesToText(builderBrief.mustKeep || [])));
        const mustChange = uniqueNarrativeLines(textToLines(linesToText(builderBrief.mustChange || [])));
        const pageLabelText = String(options.pageLabel || "페이지").trim();
        const fallbackLabels = ["상단 진입 영역", "주요 탐색 영역", "핵심 설득 영역", "보강 정보 영역"];
        const targets = orderedSlotIds.length ? orderedSlotIds : fallbackLabels.map((item, index) => `fallback-${index + 1}:${item}`);
        return targets.map((slotId, index) => {
          const isFallback = slotId.startsWith("fallback-");
          const label = isFallback ? slotId.split(":").slice(1).join(":").trim() : slotLabel(slotId);
          const why = planningDirection[index] || planningDirection[index % Math.max(planningDirection.length, 1)] || requestSummary[0] || `${pageLabelText}의 변화 이유를 더 분명히 설명합니다.`;
          const visual = designDirection[index] || designDirection[index % Math.max(designDirection.length, 1)] || "타이포, 여백, 강조 포인트를 재정렬합니다.";
          const keep = mustKeep[index] || mustKeep[index % Math.max(mustKeep.length, 1)] || "페이지의 역할과 주요 사용자 흐름은 유지합니다.";
          const change = mustChange[index] || mustChange[index % Math.max(mustChange.length, 1)] || "이 구간의 메시지와 시각 위계를 다시 설계합니다.";
          const priorityReason = (Array.isArray(requirementPlan?.priority) ? requirementPlan.priority : [])[index]?.reason || why;
          return {
            slotId: isFallback ? "" : slotId,
            label,
            why,
            visual,
            keep,
            change,
            priorityReason,
            order: index + 1,
          };
        });

      function buildDesignSpecMarkdownClient(requirementPlan = {}, options = {}, sectionBlueprints = []) {
        const builderBrief = requirementPlan?.builderBrief && typeof requirementPlan?.builderBrief === "object" ? requirementPlan.builderBrief : {};
        const pageLabelText = String(options.pageLabel || "페이지").trim();
        const viewportLabel = String(options.viewportLabel || "PC").trim();
        const title = String(requirementPlan?.title || `${pageLabelText} 시안 기획안`).trim();
        const mustKeepLines = uniqueNarrativeLines(textToLines(linesToText(builderBrief.mustKeep || []))).slice(0, 4);
        const mustChangeLines = uniqueNarrativeLines(textToLines(linesToText(builderBrief.mustChange || []))).slice(0, 5);
        const guardrailLines = uniqueNarrativeLines(textToLines(linesToText(requirementPlan?.guardrails || []))).slice(0, 6);
        return [
          `# ${title} Execution Spec`,
          "",
          "> Builder execution reference. Treat this as an implementation-facing DESIGN.md layer that translates the approved proposal into actionable section rules.",
          "",
          "## Global Spec",

        const designSpecMarkdown = buildDesignSpecMarkdownClient(requirementPlan, options, sectionBlueprints);
        return { builderMarkdown, layoutMockupMarkdown, designSpecMarkdown, sectionBlueprints };

      function truncateNarrativeLine(value = "", maxLength = 150) {
        const text = normalizeNarrativeLine(value);
        if (!text) return "";
        if (text.length <= maxLength) return text;
        return `${text.slice(0, Math.max(0, maxLength - 1)).trim()}…`;
      }

      function buildRequirementPlanDigest(requirementPlan = {}, options = {}) {
        const builderBrief = requirementPlan?.builderBrief && typeof requirementPlan.builderBrief === "object" ? requirementPlan.builderBrief : {};
        const pageLabelText = String(options.pageLabel || "페이지").trim();
        const viewportLabel = String(options.viewportLabel || "PC").trim();
        const requestSummaryLines = uniqueNarrativeLines(textToLines(linesToText(requirementPlan?.requestSummary || []))).slice(0, 4);
        const planningDirectionLines = uniqueNarrativeLines(textToLines(linesToText(requirementPlan?.planningDirection || []))).slice(0, 4);
        const designDirectionLines = uniqueNarrativeLines(textToLines(linesToText(requirementPlan?.designDirection || []))).slice(0, 4);
        const mustKeepLines = uniqueNarrativeLines(textToLines(linesToText(builderBrief.mustKeep || []))).slice(0, 3);
        const mustChangeLines = uniqueNarrativeLines(textToLines(linesToText(builderBrief.mustChange || []))).slice(0, 4);
        const objectiveLine = truncateNarrativeLine(
          String(builderBrief.objective || "").trim() || `${pageLabelText} ${viewportLabel} 화면의 메시지 구조와 시각 흐름을 재정렬합니다.`,
          180
        );
        const priorityItems = (Array.isArray(requirementPlan?.priority) ? requirementPlan.priority : [])
          .map((item, index) => ({
            rank: Number(item?.rank || index + 1) || index + 1,
            target: String(item?.target || "").trim(),
            label: slotLabel(item?.target || ""),
            reason: truncateNarrativeLine(String(item?.reason || "").trim(), 180),
          }))
          .filter((item) => item.target)
          .slice(0, 5);
        const sectionSpecs = buildProposalSectionSpecsClient(requirementPlan, options)
          .slice(0, 6)
          .map((item) => ({
            ...item,
            why: truncateNarrativeLine(item.why, 140),
            visual: truncateNarrativeLine(item.visual, 140),
            change: truncateNarrativeLine(item.change, 140),
          }));
        return {
          title: String(requirementPlan?.title || `${pageLabelText} 기획안`).trim(),
          viewportLabel,
          objectiveLine,
          summaryCards: [
            {
              title: "변경 배경",
              lines: requestSummaryLines.length ? requestSummaryLines.map((line) => truncateNarrativeLine(line, 160)) : ["현재 변경 배경이 아직 정리되지 않았습니다."],
            },
            {
              title: "기획 방향",
              lines: planningDirectionLines.length ? planningDirectionLines.map((line) => truncateNarrativeLine(line, 160)) : ["기획 방향이 아직 정리되지 않았습니다."],
            },
            {
              title: "디자인 방향",
              lines: designDirectionLines.length ? designDirectionLines.map((line) => truncateNarrativeLine(line, 160)) : ["디자인 방향이 아직 정리되지 않았습니다."],
            },
            {
              title: "유지 / 변경 기준",
              lines: [
                ...mustKeepLines.map((line) => `유지: ${truncateNarrativeLine(line, 140)}`),
                ...mustChangeLines.map((line) => `변경: ${truncateNarrativeLine(line, 140)}`),
              ].slice(0, 6),
            },
          ],
          priorityItems,
          sectionSpecs,
        };
      }

      function renderRequirementPlanDigestHtml(digest = {}) {

      function buildRequirementPlanPrdViewModel(input = {}) {
        const requirementPlan = input.requirementPlan && typeof input.requirementPlan === "object" ? input.requirementPlan : {};
        const pageIdentity = input.pageIdentity && typeof input.pageIdentity === "object" ? input.pageIdentity : {};
        const sectionBlueprints = Array.isArray(input.sectionBlueprints) ? input.sectionBlueprints : [];
        const builderBrief = requirementPlan.builderBrief && typeof requirementPlan.builderBrief === "object" ? requirementPlan.builderBrief : {};
        const pageLabelText = String(input.pageLabel || "페이지").trim();
        const viewportLabel = String(input.viewportLabel || "PC").trim();
        const requestSummary = uniqueNarrativeLines(textToLines(linesToText(requirementPlan.requestSummary || [])));
        const planningDirection = uniqueNarrativeLines(textToLines(linesToText(requirementPlan.planningDirection || [])));
        const designDirection = uniqueNarrativeLines(textToLines(linesToText(requirementPlan.designDirection || [])));
        const mustKeep = uniqueNarrativeLines([
          ...textToLines(linesToText(builderBrief.mustKeep || [])),
          ...textToLines(linesToText(pageIdentity.mustPreserve || [])),
        ]);
        const mustChange = uniqueNarrativeLines(textToLines(linesToText(builderBrief.mustChange || [])));
        const guardrails = uniqueNarrativeLines([
          ...textToLines(linesToText(requirementPlan.guardrails || [])),
          ...textToLines(linesToText(pageIdentity.visualGuardrails || [])),
        ]);
        const priorityItems = Array.isArray(requirementPlan.priority) ? requirementPlan.priority : [];
        const featuresDetail = priorityItems.length
          ? priorityItems.map((item, index) => ({
              name: slotLabel(item?.target || "") || String(item?.target || `우선 기능 ${index + 1}`).trim(),
              description: String(item?.reason || planningDirection[index] || "우선 적용 이유가 아직 정리되지 않았습니다.").trim(),
              priority: index === 0 ? "high" : index === 1 ? "mid" : "low",
            }))
          : planningDirection.slice(0, 3).map((line, index) => ({
              name: `핵심 기능 ${index + 1}`,
              description: line,
              priority: index === 0 ? "high" : index === 1 ? "mid" : "low",

          label: slotLabel(item?.target || "") || String(item?.target || `섹션 ${index + 1}`).trim(),
          slotId: String(item?.target || "").trim(),
          objective: String(item?.reason || "").trim(),
          visualDirection: designDirection[index] || designDirection[0] || "시각 위계와 강조 포인트를 재정렬합니다.",
          mustKeep: mustKeep[index] || mustKeep[0] || "페이지 역할과 주요 흐름은 유지합니다.",
          mustChange: mustChange[index] || mustChange[0] || "메시지와 시각 구조를 다시 설계합니다.",
          hierarchy: ["badge", "title", "summary", "action"],
        }))).map((item, index) => ({
          label: String(item.label || item.title || `섹션 ${index + 1}`).trim(),
          slotId: String(item.slotId || "").trim(),
          why: String(item.objective || item.problemStatement || planningDirection[index] || requestSummary[0] || `${pageLabelText} 구간의 설득 포인트를 더 분명히 합니다.`).trim(),
          visual: String(item.visualDirection || designDirection[index] || designDirection[0] || "타이포, 강조 포인트, 여백 리듬을 조정합니다.").trim(),
          keep: String(item.mustKeep || mustKeep[index] || mustKeep[0] || "기존 역할과 주요 흐름은 유지합니다.").trim(),
          change: String(item.mustChange || mustChange[index] || mustChange[0] || "메시지와 시각 위계를 재구성합니다.").trim(),
          zones: Array.isArray(item.hierarchy) ? item.hierarchy : ["badge", "title", "summary", "action"],
          viewport: viewportLabel,
        }));
        const openIssues = uniqueNarrativeLines([
          ...textToLines(linesToText(pageIdentity.shouldAvoid || [])),

        ]);
        return {
          title: String(requirementPlan.title || `${pageLabelText} 기획서`).trim(),
          summary: requestSummary[0] || `${pageLabelText}의 메시지 구조와 시각 흐름을 재정리하는 기획안입니다.`,

          scopeOut: openIssues.length ? openIssues : ["이번 단계에서는 실행 기준을 벗어나는 확장 변경은 포함하지 않습니다."],
          direction: uniqueNarrativeLines([...planningDirection, ...designDirection]),

          featuresDetail,
          features: featuresDetail.map((item) => item.name),
          screenProposals,
          flow: planningDirection.length ? planningDirection.slice(0, 4).map((line, index) => index === 0 ? `사용자가 ${pageLabelText}에 진입하면 ${line}` : line) : [`사용자가 ${pageLabelText}에 진입하면 핵심 메시지를 먼저 이해합니다.`, "주요 섹션을 따라 정보와 혜택을 확인합니다.", "필요한 경우 비교 또는 상세 확인으로 이동합니다."],
          roadmap: ["1단계: 페이지 정체성과 요구사항 정리", "2단계: 기획서 확정 및 디자인 빌더 실행", "3단계: 결과 검토 후 저장 버전 확정"],
          openIssues: openIssues.length ? openIssues : ["추가 확인이 필요한 항목은 디자인 빌더 실행 후 비교 화면에서 검토합니다."],
          layoutMockupMarkdown: String(input.layoutMockupMarkdown || "").trim(),
          designSpecMarkdown: String(input.designSpecMarkdown || "").trim(),
        };

      function renderPrdHtml(prd = {}, options = {}) {
        if (!prd || !Object.keys(prd).length) {
          return `<div class="doc-empty"><p>아직 기획서가 없습니다.<br>위 요구사항을 입력한 뒤 <strong>기획안 생성</strong>을 눌러 주세요.</p></div>`;
        }
        const toArr = (value) => Array.isArray(value) ? value : (value ? [value] : []);
        const idPrefix = String(options.idPrefix || "prd").trim() || "prd";
        const makeId = (suffix) => `${idPrefix}-${suffix}`;
        const priorityMeta = { high: ["high", "높음"], mid: ["mid", "보통"], low: ["low", "낮음"] };
        const featureRows = toArr(prd.featuresDetail).length
          ? prd.featuresDetail.map((feature, index) => {
              const [cls, txt] = priorityMeta[feature.priority] || priorityMeta.low;

      function createRequestError({ url, status = 0, code = "", detail = "", cause = null }) {
        const error = new Error(detail || code || `Request failed: ${url}`);
        error.url = url;
        error.status = Number(status) || 0;
        error.code = String(code || "").trim();
        error.detail = String(detail || "").trim();
        error.cause = cause || null;
        return error;
      }

      function describeRequestError(error) {
        const status = Number(error?.status || 0);
        const code = String(error?.code || "").trim();
        const detail = String(error?.detail || error?.message || "").trim();
        if (status === 401 || status === 403) {
          return "로그인 세션이 만료되었거나 권한이 없습니다. 새로고침 후 다시 로그인해 주세요.";
        }
        if (status >= 500) {
          return `서버 처리 실패 (${code || status}). ${detail || "PM2 로그를 확인해 주세요."}`;
        }
        if (status > 0) {
          return `요청 실패 (${status}). ${detail || code || "응답 내용을 확인해 주세요."}`;
        }
        if (error?.name === "TypeError") {
          return "서버에 연결하지 못했습니다. 탭 새로고침 후 다시 시도하고, 계속되면 Network 탭과 PM2 로그를 확인해 주세요.";
        }
        return detail || "알 수 없는 요청 오류가 발생했습니다.";
      }

      async function fetchJson(url, options) {
        let response;
        try {
          response = await fetch(url, options);
        } catch (error) {
          throw createRequestError({
            url,
            detail: `network_error: ${String(error?.message || error)}`,
            cause: error,
          });
        }
        let payload = null;
        const rawText = await response.text();
        try {
          payload = rawText ? JSON.parse(rawText) : {};
        } catch {
          payload = { detail: rawText || "invalid_json_response" };
        }
        if (!response.ok) {
          throw createRequestError({
            url,
            status: response.status,
            code: payload?.error || "",
            detail: payload?.detail || payload?.error || `Request failed: ${url}`,
          });
        }
        return payload;
      }

      function stopProgressMessages(kind = "planner") {
        if (kind === "builder" && builderProgressTimer) {
          window.clearInterval(builderProgressTimer);
          builderProgressTimer = null;
        }
        if (kind === "builder" && builderProgressPoller) {
          window.clearInterval(builderProgressPoller);
          builderProgressPoller = null;
          return;
        }
        if (kind !== "builder" && plannerProgressTimer) {
          window.clearInterval(plannerProgressTimer);
          plannerProgressTimer = null;
        }
        if (kind !== "builder" && plannerProgressPoller) {
          window.clearInterval(plannerProgressPoller);
          plannerProgressPoller = null;
        }
      }

      function startProgressMessages(kind, statusEl, messages) {
        stopProgressMessages(kind);
        const steps = Array.isArray(messages) ? messages.filter(Boolean) : [];
        if (!statusEl || !steps.length) return;
        let index = 0;
        statusEl.textContent = steps[0];
        const timerId = window.setInterval(() => {
          index = (index + 1) % steps.length;
          statusEl.textContent = steps[index];
        }, 2200);
        if (kind === "builder") {
          builderProgressTimer = timerId;
        } else {
          plannerProgressTimer = timerId;
        }
      }

      function formatProgressStatus(item, fallbackText = "생성중입니다.") {
        const percent = Number(item?.percent || 0);
        const message = String(item?.message || "").trim() || fallbackText;
        if (percent > 0 && percent < 100) return `${message} (${percent}%)`;
        if (percent >= 100 && message) return message;
        return fallbackText;
      }

      function startProgressPolling(kind, workspacePageId, statusEl, fallbackText) {
        if (!workspacePageId || !statusEl) return;
        stopProgressMessages(kind);
        const poll = async () => {
          try {
            const payload = await fetchJson(`/api/workspace/llm-progress?pageId=${encodeURIComponent(workspacePageId)}&kind=${encodeURIComponent(kind)}`);
            const item = payload?.item || null;
            statusEl.textContent = formatProgressStatus(item, fallbackText);
            if (item?.status === "completed" || item?.status === "failed") {
              stopProgressMessages(kind);
            }
          } catch (_) {}
        };
        poll();
        const timerId = window.setInterval(poll, 900);
        if (kind === "builder") builderProgressPoller = timerId;
        else plannerProgressPoller = timerId;
      }

      function buildSidebarVersionRecords(cache = {}) {
        const plans = Array.isArray(cache.plans) ? cache.plans : [];
        const draftBuilds = Array.isArray(cache.draftBuilds) ? cache.draftBuilds : [];
        const versions = Array.isArray(cache.versions) ? cache.versions : [];
        const planMap = new Map(plans.map((item) => [item.id, item]));
        const draftMap = new Map(draftBuilds.map((item) => [item.id, item]));
        const versionRecords = versions.map((item) => {
          const linkedBuild = item.buildId ? draftMap.get(item.buildId) || null : null;
          const linkedPlan = item.planId
            ? planMap.get(item.planId) || null
            : (linkedBuild?.planId ? planMap.get(linkedBuild.planId) || null : null);
          return {
            key: `version:${item.id}`,
            kind: "version",
            version: item,
            build: linkedBuild,
            plan: linkedPlan,
            label: item.versionLabel || linkedBuild?.proposedVersionLabel || linkedPlan?.title || item.id,
            meta: `saved · ${formatPlanUpdatedAt(item.createdAt || item.updatedAt)}`,
            updatedAt: item.updatedAt || item.createdAt || linkedBuild?.updatedAt || linkedPlan?.updatedAt || linkedPlan?.createdAt || "",
          };
        });
        const versionBuildIds = new Set(versionRecords.map((item) => item.build?.id).filter(Boolean));
        const draftRecords = draftBuilds
          .filter((item) => !versionBuildIds.has(item.id))
          .map((item) => ({
            key: `draft:${item.id}`,
            kind: "draft",
            version: null,
            build: item,
            plan: item.planId ? planMap.get(item.planId) || null : null,
            label: item.proposedVersionLabel || planMap.get(item.planId)?.title || item.id,
            meta: `draft · ${formatPlanUpdatedAt(item.updatedAt || item.createdAt)}`,
            updatedAt: item.updatedAt || item.createdAt || "",
          }));
        const coveredPlanIds = new Set(
          [...versionRecords, ...draftRecords]
            .map((item) => item.plan?.id || item.build?.planId || "")
            .filter(Boolean)
        );
        const planRecords = plans
          .filter((item) => !coveredPlanIds.has(item.id))
          .map((item) => ({
            key: `plan:${item.id}`,
            kind: "plan",
            version: null,
            build: null,
            plan: item,
            label: item.title || item.id,
            meta: `plan · ${formatPlanUpdatedAt(item.updatedAt || item.createdAt)}`,
            updatedAt: item.updatedAt || item.createdAt || "",
          }));
        return [...versionRecords, ...draftRecords, ...planRecords].sort((left, right) =>
          String(right.updatedAt || "").localeCompare(String(left.updatedAt || ""))
        );
      }

      function findNextActionablePageId(excludePageId = "") {
        const states = (finalReadinessMeta?.pages || [])
          .filter((item) => item.pageId !== excludePageId)
          .filter((item) => item.acceptanceStatus === "needs-review" || item.acceptanceStatus === "in-progress")
          .sort((a, b) => {
            const acceptanceOrder = { "needs-review": 0, "in-progress": 1, accepted: 2 };
            const ar = acceptanceOrder[a.acceptanceStatus || "in-progress"] ?? 9;
            const br = acceptanceOrder[b.acceptanceStatus || "in-progress"] ?? 9;
            if (ar !== br) return ar - br;
            const riskDiff = Number(b.maxRiskScore || 0) - Number(a.maxRiskScore || 0);
            if (riskDiff !== 0) return riskDiff;
            const fallbackDiff = Number(b.fallbackComponentCount || 0) - Number(a.fallbackComponentCount || 0);
            if (fallbackDiff !== 0) return fallbackDiff;
            const pendingDiff = Number(b.acceptanceCounts?.pending || 0) - Number(a.acceptanceCounts?.pending || 0);
            if (pendingDiff !== 0) return pendingDiff;
            return String(a.pageId || "").localeCompare(String(b.pageId || ""), "ko");
          });
        return states[0]?.pageId || "";
      }

      function getPageAdvisoryMeta(pageId) {
        const runtimePageId = pages.find((page) => page.id === pageId)?.workspacePageId || pageId;
        const items = Array.isArray(pageAdvisories?.[runtimePageId]) ? pageAdvisories[runtimePageId] : [];
        const severityRank = { error: 3, warning: 2, info: 1 };
        const highestSeverity = items.reduce((current, item) => {
          const nextSeverity = String(item?.severity || "info");
          return (severityRank[nextSeverity] || 0) > (severityRank[current] || 0) ? nextSeverity : current;
        }, "");
        return {
          count: items.length,
          highestSeverity: highestSeverity || "none",
        };
      }

      function buildPageReviewMap(visualManifest) {
        const nextMap = new Map();
        if (visualManifest?.home) {
          nextMap.set("home", visualManifest.home);
        }
        for (const item of visualManifest?.servicePages || []) {
          if (item?.pageId) nextMap.set(item.pageId, item);
        }
        for (const item of visualManifest?.plpPages || []) {
          if (item?.pageId) nextMap.set(item.pageId, item);
        }
        return nextMap;
      }

        const [finalReadinessResult, visualManifestResult] = await Promise.allSettled([
          fetchJson("/api/workspace/final-readiness"),
          fetchJson("/api/visual-review-manifest"),
        ]);
        if (generation !== refreshGeneration) return;
        if (finalReadinessResult.status === "fulfilled") {
          finalReadinessMeta = finalReadinessResult.value || null;
        }
        if (visualManifestResult.status === "fulfilled") {
          pageReviewMap = buildPageReviewMap(visualManifestResult.value || null);

        renderHistoryPanel();

      async function refreshData(options = {}) {
        const generation = ++refreshGeneration;
        const [session, data, activity] = await Promise.all([
          fetchJson("/api/auth/session"),
          fetchJson("/api/data"),
          fetchJson("/api/activity?limit=20"),
        ]);
        if (!session?.authenticated) {
          location.href = "/login";
          return;
        }
        currentSession = session || null;
        sessionMetaEl.textContent = `${session.user?.displayName || session.user?.loginId} · ${data.workspaceSource || "shared-default"}`;
        workspaceMeta = data.workspaceMeta || null;
        recentActivity = activity.items || [];
        runtimePageSummary = data.runtimePageSummary || null;
        pageAdvisories = data.pageAdvisories || {};
        finalReadinessMeta = null;
        pageReviewMap = new Map();
        acceptanceBundles = null;
        pages = (data.pages || []).slice().sort((a, b) => {
          return String(a.title || a.id).localeCompare(String(b.title || b.id), "ko");
        });
        pages = buildPreviewTargets(data.pages || []);
        if (selectedId && !pages.find((page) => page.id === selectedId)) {
          selectedId = "";
          selectedBundleId = "";
        }
        if (!pages.find((page) => page.id === pendingSelectedId)) {
          pendingSelectedId = selectedId || pages[0]?.id || "";
        }
        syncAdminStateUrl();
        renderList();
        if (!options.skipDetail) {
          if (options.forceDetail === true) {
            await renderDetail();
          } else {
            renderDetailIdleState();
          }
        }
        renderHistoryPanel();
        hydrateDeferredAdminMeta(generation).catch((error) => {
          console.error("failed to hydrate admin meta", error);
        });
      }

        return pages.filter((page) => {

            page.title,
            page.id,

            getTargetKindLabel(page),
            getPageGroupLabel(page),
          ].map((item) => String(item || "").toLowerCase());
          const matchesQuery = !query || searchable.some((item) => item.includes(query));
          if (!matchesQuery) return false;

          const cache = sidebarRecordCacheByPage.get(page.id) || { plans: [], draftBuilds: [], versions: [] };
          const hasPlan = (cache.plans || []).length > 0;

          if (pageFilter === "working") return hasIdentity || hasPlan || hasDraft || hasVersion;

      function focusNextPendingBundle(bundleId) {
        if (!bundleId) return;

        target.classList.add("acceptance-next-target");

          target.scrollIntoView();
        }
        const compareLink = target.querySelector("[data-acceptance-compare-link]");
        const statusSelect = target.querySelector(".acceptance-status-select");
        const focusTarget = compareLink || statusSelect;

          window.setTimeout(() => {

      async function navigateToBundle(pageId, bundleId) {
        if (!pageId) return;
        selectedId = pageId;
        pendingSelectedId = pageId;
        selectedBundleId = bundleId || "";
        syncAdminStateUrl("push");
        renderList();
        await renderDetail();

      function buildAdminStateUrl(pageId, bundleId) {
        const url = new URL(window.location.href);
        const resolvedPageId = pageId || selectedId || "";
        url.searchParams.set("pageId", resolvedPageId);
        if (bundleId || selectedBundleId) {
          url.searchParams.set("bundleId", bundleId || selectedBundleId);
        } else {
          url.searchParams.delete("bundleId");
        }
        url.searchParams.set("activityFilter", activityFilter || "all");
        const resolvedPage = pages.find((page) => page.id === resolvedPageId) || null;
        if (isHomeTarget(resolvedPage || { workspacePageId: resolvedPageId })) {
          url.searchParams.set("homeViewport", getSelectedViewportProfile(resolvedPage || { id: resolvedPageId, workspacePageId: "home" }, "pc"));
        } else {
          url.searchParams.delete("homeViewport");
        }
        return url.toString();
      }

      async function copyCurrentAdminLink() {
        const text = buildAdminStateUrl();
        await copyText(text);
        return text;
      }

      async function copyAdminLinkFor(pageId, bundleId) {
        const text = buildAdminStateUrl(pageId, bundleId);
        await copyText(text);
        return text;
      }

      async function copyText(text) {
        if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(text);
          return text;
        }
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.setAttribute("readonly", "readonly");
        textarea.style.position = "absolute";
        textarea.style.left = "-9999px";
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        textarea.remove();
        return text;
      }

      async function saveAcceptanceDecision({ bundleId, status, note, statusEl, currentPageId }) {
        if (!bundleId || !statusEl) return;
        if (status === "fail" && !String(note || "").trim()) {
          statusEl.textContent = "Fail note is required";
          showAdminNotice("Fail note is required", "error");
          return;
        }
        statusEl.textContent = "Saving acceptance...";
        await fetchJson("/api/workspace/acceptance-result", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            bundleId,
            status,
            note: note || "",
          }),
        });
        await refreshData({ skipDetail: true });
        const currentPageState = (finalReadinessMeta?.pages || []).find((item) => item.pageId === currentPageId);
        if (status === "pass" && currentPageState?.acceptanceStatus === "accepted") {
          selectedId = findNextActionablePageId(currentPageId) || selectedId;
          pendingSelectedId = selectedId;
          selectedBundleId = "";
        }
        syncAdminStateUrl();
        renderList();
        await renderDetail();
        const nextPendingBundleId =
          selectedId === currentPageId
            ? (detailEl.querySelector('[data-next-pending-bundle-id]')?.getAttribute('data-next-pending-bundle-id') || "")
            : "";
        if (nextPendingBundleId) {
          selectedBundleId = nextPendingBundleId;
          syncAdminStateUrl();
          focusNextPendingBundle(nextPendingBundleId);
        } else if (selectedId === currentPageId) {
          selectedBundleId = "";
          syncAdminStateUrl();
        }
        showAdminNotice(`Acceptance saved: ${bundleId} -> ${status}`);
      }

      async function renderDetail() {
        const page = pages.find((p) => p.id === selectedId);
        if (!page) {
          renderDetailIdleState();
          return;
        }
        const workspacePageId = getTargetWorkspacePageId(page);
        const runtimePageId = getTargetRuntimePageId(page);
        const currentPageId = page.id;
        const isHomeTarget = workspacePageId === "home";
        const selectedViewportProfile = getSelectedViewportProfile(page, "pc");
        const previewUrl = buildPreviewTargetUrl(page, selectedViewportProfile);
        const isPdpTarget = page.targetKind === "pdp";
        detailEl.innerHTML = "Loading page detail...";
        let inventory = { components: [] };
        let editability = { components: [] };
        let slotRegistry = { slots: [] };
        let shareSectionRegistry = { sections: [] };
        let artifactSectionRegistry = { sections: [] };

        const runBtn = document.getElementById("runLlm");
        const resetWorkspaceBtn = document.getElementById("resetWorkspaceBtn");
        const editPageIdentityBtn = document.getElementById("editPageIdentityBtn");
        const homeViewportProfileEl = document.getElementById("homeViewportProfile");
        const promptEl = document.getElementById("llmPrompt");
        const legacyStatusEl = document.getElementById("llmStatus");
        if (runBtn && legacyStatusEl) {
          runBtn.disabled = false;
          runBtn.title = "";
          legacyStatusEl.textContent = "대기 중";
        }
        if (plannerStatusEl) plannerStatusEl.textContent = "기획안 생성중입니다.";

        homeViewportProfileEl?.addEventListener("change", async () => {
          const nextViewport = normalizeViewportProfile(homeViewportProfileEl.value, "pc") === "mo" ? "ta" : normalizeViewportProfile(homeViewportProfileEl.value, "pc");
          homeViewportStateByPage.set(page.id, nextViewport);
          syncAdminStateUrl("push");
          await renderDetail();
        });

        togglePlanEditModeBtn?.addEventListener("click", async () => {
          const currentState = plannerUiStateByPage.get(workspacePageId) || { draftVisible: true, loading: false, editMode: false };
          plannerUiStateByPage.set(workspacePageId, {
            ...currentState,
            draftVisible: true,
            loading: false,
            editMode: !currentState.editMode,
          });
          await rerenderDetailWithFocus({ selector: "#plannerDraftRegion", behavior: "auto", block: "start" });
        });

        const collectPlanTargetSelection = () => {
          const componentOnly = Boolean(document.getElementById("planComponentOnly")?.checked);
          const targetComponents = Array.from(detailEl.querySelectorAll('input[name="planTargetComponent"]:checked'))
            .map((input) => String(input.value || "").trim())
            .filter(Boolean);
          return {
            targetScope: componentOnly ? "components" : "page",
            targetComponents,
          };
        };

        const updatePlannerTargetUi = () => {
          const componentOnly = Boolean(document.getElementById("planComponentOnly")?.checked);
          const plannerTargetBoxEl = document.getElementById("plannerTargetBox");
          if (plannerTargetBoxEl) plannerTargetBoxEl.hidden = !componentOnly;
        };

        const updatePlanModeUi = () => {
          const planMode = document.getElementById("planMode")?.value || "hybrid";
          const fieldConfig = {
            hybrid: ["reference", "preferred", "tone", "key", "avoid", "request"],
            direct: ["key", "avoid", "request"],
            reference: ["preferred", "avoid", "reference"],
          };
          const visibleFields = fieldConfig[planMode] || fieldConfig.hybrid;
          detailEl.querySelectorAll("[data-plan-field]").forEach((fieldEl) => {
            const fieldId = fieldEl.getAttribute("data-plan-field") || "";
            const order = visibleFields.indexOf(fieldId);
            fieldEl.hidden = order < 0;
            fieldEl.style.order = order >= 0 ? String(order + 1) : "";
          });
        };

        const showPlannerLoadingState = (statusText) => {
          plannerUiStateByPage.set(workspacePageId, { ...plannerUiStateByPage.get(workspacePageId), draftVisible: true, loading: true, editMode: false });
          if (plannerDraftRegionEl) plannerDraftRegionEl.hidden = false;
          if (plannerLoadingBoxEl) plannerLoadingBoxEl.hidden = false;
          if (plannerDraftFormEl) plannerDraftFormEl.hidden = true;
          if (plannerStatusEl) plannerStatusEl.textContent = statusText || "기획안 생성중입니다.";
          startProgressPolling("planner", workspacePageId, plannerStatusEl, statusText || "기획안 생성중입니다.");
        };

        const showPlannerDraftState = () => {
          stopProgressMessages("planner");
          plannerUiStateByPage.set(workspacePageId, { ...plannerUiStateByPage.get(workspacePageId), draftVisible: true, loading: false });
          if (plannerDraftRegionEl) plannerDraftRegionEl.hidden = false;
          if (plannerLoadingBoxEl) plannerLoadingBoxEl.hidden = true;
          if (plannerDraftFormEl) plannerDraftFormEl.hidden = false;
        };

        const showBuilderLoadingState = () => {
          builderUiStateByPage.set(workspacePageId, { loading: true });
          if (builderLoadingBoxEl) builderLoadingBoxEl.hidden = false;
        };

        const showBuilderIdleState = () => {
          stopProgressMessages("builder");
          builderUiStateByPage.set(workspacePageId, { loading: false });
          if (builderLoadingBoxEl) builderLoadingBoxEl.hidden = true;
        };

        const collectCurrentRequirementPlan = () => {
          const requirementPlan = {
            title: (document.getElementById("planTitle")?.value || "").trim(),
            designChangeLevel: document.getElementById("planDesignChangeLevel")?.value || latestRequirementPlan?.designChangeLevel || "medium",
            requestSummary: textToLines(document.getElementById("planRequestSummary")?.value || ""),
            planningDirection: textToLines(document.getElementById("planPlanningDirection")?.value || ""),
            designDirection: textToLines(document.getElementById("planDesignDirection")?.value || ""),
            priority: textToPriority(document.getElementById("planPriority")?.value || ""),
            guardrails: textToLines(document.getElementById("planGuardrails")?.value || ""),
            referenceNotes: latestRequirementPlan?.referenceNotes || [],
            builderBrief: {
              objective: (document.getElementById("planBuilderObjective")?.value || "").trim(),
              mustKeep: textToLines(document.getElementById("planBuilderMustKeep")?.value || ""),
              mustChange: textToLines(document.getElementById("planBuilderMustChange")?.value || ""),
              suggestedFocusSlots: (document.getElementById("planBuilderFocusSlots")?.value || "")
                .split(",")
                .map((item) => item.trim())
                .filter(Boolean),
            },
          };
          return {
            ...requirementPlan,
            ...buildRequirementPlanMarkdownDocsClient(requirementPlan, {
              pageLabel: pageLabel(page.id, page.title),
              viewportLabel: isHomeTarget ? getViewportLabel(selectedViewportProfile) : "PC",
              pageIdentity: latestToolContext?.pageContext?.pageIdentity || {},
            }),
          };
        };

        const persistCurrentPlanDraft = async () => {
          if (!latestPlan) {
            throw new Error("저장할 정리본이 없습니다.");
          }
          const requirementPlan = collectCurrentRequirementPlan();
          const currentDesignChangeLevel = document.getElementById("planDesignChangeLevel")?.value || requirementPlan.designChangeLevel || "medium";
          if (!requirementPlan.title) {
            throw new Error("기획안 제목은 필요합니다.");
          }
          const item = await fetchJson("/api/workspace/plan", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              id: latestPlan.id,
              pageId: workspacePageId,
              viewportProfile: isHomeTarget ? selectedViewportProfile : (latestPlan.viewportProfile || "pc"),
              mode: latestPlan.mode || "hybrid",
              status: latestPlan.status || "draft",
              title: requirementPlan.title,
              summary: requirementPlan.title,
              input: {
                ...(latestPlan.input || {}),
                userInput: {
                  ...((latestPlan.input && latestPlan.input.userInput) || {}),
                  designChangeLevel: currentDesignChangeLevel,
                },
              },
              output: {
                requirementPlan,
                toolContext: latestToolContext || {},
              },
            }),
          });
          return { item, requirementPlan };
        };

        const runBuilderWorkflow = async () => {
          if (!latestPlan) {
            if (builderStatusEl) builderStatusEl.textContent = "기획 초안이 필요합니다.";
            return;
          }
          const { targetScope, targetComponents } = collectPlanTargetSelection();
          if (targetScope === "components" && !targetComponents.length) {
            if (builderStatusEl) builderStatusEl.textContent = "컴포넌트 범위를 선택했다면 최소 1개는 체크해야 합니다.";
            return;
          }
          const versionLabelHint = (document.getElementById("builderVersionLabelHint")?.value || "").trim();
          const approvedPlan = latestRequirementPlan ? collectCurrentRequirementPlan() : null;
          const designChangeLevel = document.getElementById("planDesignChangeLevel")?.value || approvedPlan?.designChangeLevel || latestPlanUserInput?.designChangeLevel || "medium";
          const intensityMap = {
            low: "conservative",
            medium: "balanced",
            high: "bold",
          };
          const intensity = intensityMap[designChangeLevel] || "balanced";
          if (!approvedPlan) {
            if (builderStatusEl) builderStatusEl.textContent = "기획 초안이 필요합니다.";
            return;
          }
          showBuilderLoadingState();
          if (builderStatusEl) builderStatusEl.textContent = "디자인 생성중입니다.";
          startProgressPolling("builder", workspacePageId, builderStatusEl, "디자인 생성중입니다.");
          try {
            const payload = await fetchJson("/api/llm/build", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                pageId: workspacePageId,
                viewportProfile: isHomeTarget ? selectedViewportProfile : "pc",
                planId: latestPlan.id,
                approvedPlan,
                intensity,
                versionLabelHint,
                designChangeLevel,
                targetScope,
                targetComponents,
              }),
            });
            showBuilderIdleState();
            if (builderStatusEl) builderStatusEl.textContent = payload.summary || "디자인 생성 완료";
            showAdminNotice("디자인 생성 완료");
            await rerenderDetailWithFocus({ selector: "#builderResultSection", behavior: "smooth", block: "start" });
          } catch (error) {
            showBuilderIdleState();
            if (builderStatusEl) builderStatusEl.textContent = "디자인 생성 실패: " + describeRequestError(error);
          }
        };

        document.getElementById("planMode")?.addEventListener("change", updatePlanModeUi);
        document.getElementById("planComponentOnly")?.addEventListener("change", updatePlannerTargetUi);
        updatePlanModeUi();
        updatePlannerTargetUi();

        if (resetWorkspaceBtn) {
          resetWorkspaceBtn.addEventListener("click", async () => {
            if (plannerStatusEl) plannerStatusEl.textContent = "작업본 초기화 중...";
            if (legacyStatusEl) legacyStatusEl.textContent = "작업본 초기화 중...";
            try {
              await fetchJson("/api/workspace/reset", { method: "POST" });
              await refreshData();
              if (plannerStatusEl) plannerStatusEl.textContent = "공용 기본값으로 초기화됨";
              if (legacyStatusEl) legacyStatusEl.textContent = "공용 기본값으로 초기화됨";
            } catch (error) {
              if (plannerStatusEl) plannerStatusEl.textContent = "초기화 실패: " + String(error);
              if (legacyStatusEl) legacyStatusEl.textContent = "초기화 실패: " + String(error);
            }
          });
        }

        editPageIdentityBtn?.addEventListener("click", async () => {
          await openPageIdentityModal(page);
        });

        plannerRunBtn?.addEventListener("click", async () => {
          const planModeEl = document.getElementById("planMode");
          const planRequestTextEl = document.getElementById("planRequestText");
          const planKeyMessageEl = document.getElementById("planKeyMessage");
          const planPreferredDirectionEl = document.getElementById("planPreferredDirection");
          const planAvoidDirectionEl = document.getElementById("planAvoidDirection");
          const planToneAndMoodEl = document.getElementById("planToneAndMood");
          const planReferenceUrlsEl = document.getElementById("planReferenceUrls");
          const { targetScope, targetComponents } = collectPlanTargetSelection();
          const mode = planModeEl?.value || "hybrid";
          const rawRequestText = (planRequestTextEl?.value || "").trim();
          const rawKeyMessage = (planKeyMessageEl?.value || "").trim();
          const rawPreferredDirection = (planPreferredDirectionEl?.value || "").trim();
          const rawAvoidDirection = (planAvoidDirectionEl?.value || "").trim();
          const rawToneAndMood = (planToneAndMoodEl?.value || "").trim();
          const rawReferenceUrls = textToLines(planReferenceUrlsEl?.value || "");
          const designChangeLevel = document.getElementById("planDesignChangeLevel")?.value || "medium";
          const requestText = mode === "reference" ? "" : rawRequestText;
          const keyMessage = mode === "reference" ? "" : rawKeyMessage;
          const preferredDirection = mode === "direct" ? "" : rawPreferredDirection;
          const avoidDirection = rawAvoidDirection;
          const toneAndMood = mode === "hybrid" ? rawToneAndMood : "";
          const referenceUrls = mode === "direct" ? [] : rawReferenceUrls;
          if (targetScope === "components" && !targetComponents.length) {
            if (plannerStatusEl) plannerStatusEl.textContent = "선택한 컴포넌트만 진행하려면 최소 1개는 체크해야 합니다.";
            return;
          }
          if (!requestText && !referenceUrls.length) {
            if (plannerStatusEl) plannerStatusEl.textContent = "고객 요청 또는 레퍼런스 URL 중 하나는 필요합니다.";
            return;
          }
          showPlannerLoadingState("기획안 생성 중...");
          try {
            const payload = await fetchJson("/api/llm/plan", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                pageId: workspacePageId,
                viewportProfile: isHomeTarget ? selectedViewportProfile : "pc",
                mode,
                requestText,
                keyMessage,
                preferredDirection,
                avoidDirection,
                toneAndMood,
                referenceUrls,
                designChangeLevel,
                targetScope,
                targetComponents,
              }),
            });
            plannerUiStateByPage.set(workspacePageId, { draftVisible: true, loading: false });
            if (plannerStatusEl) plannerStatusEl.textContent = payload.summary || "기획안 생성 완료";
            showAdminNotice("기획안 생성 완료");
            await rerenderDetailWithFocus({ selector: "#plannerDraftRegion", behavior: "smooth", block: "start" });
          } catch (error) {
            console.error("[planner] plan request failed", {
              pageId: workspacePageId,
              error,
              status: error?.status || 0,
              code: error?.code || "",
              detail: error?.detail || String(error),
            });
            showPlannerDraftState();
            if (plannerStatusEl) plannerStatusEl.textContent = "기획안 생성 실패: " + describeRequestError(error);
          }
        });

        savePlanBtn?.addEventListener("click", async () => {
          if (planSaveStatusEl) planSaveStatusEl.textContent = "정리본 저장 중...";
          try {
            await persistCurrentPlanDraft();
            if (planSaveStatusEl) planSaveStatusEl.textContent = "정리본 저장 완료";
            showAdminNotice("정리본 저장 완료");
            await rerenderDetailWithFocus({ selector: "#plannerDraftRegion", behavior: "smooth", block: "start" });
          } catch (error) {
            if (planSaveStatusEl) planSaveStatusEl.textContent = "정리본 저장 실패: " + String(error);
          }
        });

        const runBuilderBtn = document.getElementById("runBuilder");
        const builderStatusEl = document.getElementById("builderStatus");
        const saveVersionBtn = document.getElementById("saveVersionBtn");
        const versionStatusEl = document.getElementById("versionStatus");

        runBuilderBtn?.addEventListener("click", async () => {
          await runBuilderWorkflow();
        });

        saveVersionBtn?.addEventListener("click", async () => {
          if (!latestDraftBuild) {
            if (versionStatusEl) versionStatusEl.textContent = "저장할 draft build가 없습니다.";
            return;
          }
          if (versionStatusEl) versionStatusEl.textContent = "버전 저장 중...";
          try {
            const item = await fetchJson("/api/workspace/version-save", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                pageId: workspacePageId,
                viewportProfile: isHomeTarget ? selectedViewportProfile : (latestDraftBuild.viewportProfile || "pc"),
                planId: latestDraftBuild.planId || latestPlan?.id || "",
                buildId: latestDraftBuild.id,
                versionLabel: latestDraftBuild.proposedVersionLabel || `${workspacePageId}-draft-v1`,
                summary: latestDraftBuild.summary || "",
                snapshotData: latestDraftBuild.snapshotData || {},
              }),
            });
            if (versionStatusEl) versionStatusEl.textContent = `버전 저장 완료: ${item.item?.versionLabel || item.item?.id || "saved"}`;
            showAdminNotice("새 버전 저장 완료");
            await rerenderDetailWithFocus({ selector: "#builderWorkflowSection", behavior: "smooth", block: "start" });
          } catch (error) {
            if (versionStatusEl) versionStatusEl.textContent = "버전 저장 실패: " + String(error);
          }
        });

        detailEl.querySelectorAll(".pin-version-btn").forEach((button) => {
          button.addEventListener("click", async () => {
            const versionId = button.getAttribute("data-version-id") || "";
            if (!versionId) return;
            if (versionStatusEl) versionStatusEl.textContent = "클론 적용 중...";
            try {
              await fetchJson("/api/workspace/view-pin", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  pageId: workspacePageId,
                  versionId,
                  viewportProfile: isHomeTarget ? selectedViewportProfile : "pc",
                }),
              });
              if (versionStatusEl) versionStatusEl.textContent = `클론 적용 완료: ${versionId}`;
              showAdminNotice("클론 적용 완료");
              await rerenderDetailWithFocus({ selector: "#builderWorkflowSection", behavior: "smooth", block: "start" });
            } catch (error) {
              if (versionStatusEl) versionStatusEl.textContent = "클론 적용 실패: " + String(error);
            }
          });
        });

        runBtn?.addEventListener("click", async () => {
          const prompt = (promptEl.value || "").trim();
          if (!prompt) {
            legacyStatusEl.textContent = "요청 문구를 입력해야 한다";
            return;
          }
          const contextualPrompt = isPdpTarget
            ? `현재 작업 대상은 ${pageLabel(page.id, page.title)}이며, 실제 적용 pageId는 ${workspacePageId} 입니다. 이 요청은 현재 대표 PDP 케이스에만 독립 저장해야 합니다. 캡처 기준 페이지는 ${runtimePageId} 이며 PDP 관련 슬롯(gallery, summary, price, option, sticky, review, qna)을 우선 고려하세요. 사용자 요청: ${prompt}`
            : `현재 작업 대상 pageId는 ${workspacePageId} 입니다. 사용자 요청: ${prompt}`;
          legacyStatusEl.textContent = "AI 적용 중...";
          try {
            const response = await fetch("/api/llm/change", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ prompt: contextualPrompt }),
            });
            const payload = await response.json();
            if (!response.ok) {
              legacyStatusEl.textContent = `실패: ${payload.detail || payload.error}`;
              return;
            }
            legacyStatusEl.textContent = payload.summary || "적용 완료";
            await refreshData();
          } catch (error) {
            legacyStatusEl.textContent = "실패: " + String(error);
          }
        });

        detailEl.querySelector("#toggleSectionImageDiff")?.addEventListener("change", async (event) => {
          sectionPreviewImageDiffEnabled = Boolean(event.target?.checked);
          await rerenderDetailWithFocus({ selector: "#builderResultSection", behavior: "auto", block: "start" });
        });

        detailEl.querySelectorAll(".component-card").forEach((card) => {
          const pageId = card.dataset.pageId;
          const componentId = card.dataset.componentId;
          const slotId = card.dataset.slotId;
          const sourceSelect = card.querySelector(".source-select");
          const patchEl = card.querySelector(".patch-json");
          const componentStatusEl = card.querySelector(".component-status");

          card.querySelector(".apply-source-btn")?.addEventListener("click", async () => {
            componentStatusEl.textContent = "소스 적용 중...";
            try {
              await fetchJson("/api/workspace/slot-source", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ pageId, slotId, sourceId: sourceSelect.value }),
              });
              componentStatusEl.textContent = `소스 적용 완료: ${sourceSelect.value}`;
              await renderDetail();
            } catch (error) {
              componentStatusEl.textContent = "소스 적용 실패: " + String(error);
            }
          });

          card.querySelector(".load-patch-btn")?.addEventListener("click", async () => {
            componentStatusEl.textContent = "저장된 수정 불러오는 중...";
            try {
              const payload = await fetchJson(`/api/workspace/component-patches?pageId=${encodeURIComponent(pageId)}&componentId=${encodeURIComponent(componentId)}&sourceId=${encodeURIComponent(sourceSelect.value)}${pageId === "home" ? `&viewportProfile=${encodeURIComponent(selectedViewportProfile)}` : ""}`);
              patchEl.value = payload.patch ? JSON.stringify(payload.patch, null, 2) : "";
              componentStatusEl.textContent = payload.patch ? "저장된 수정 불러옴" : "저장된 수정 없음";
            } catch (error) {
              componentStatusEl.textContent = "불러오기 실패: " + String(error);
            }
          });

          card.querySelector(".apply-patch-btn")?.addEventListener("click", async () => {
            let patch = {};
            try {
              patch = patchEl.value.trim() ? JSON.parse(patchEl.value) : {};
            } catch (error) {
              componentStatusEl.textContent = "수정 JSON 형식이 올바르지 않음";
              return;
            }
            componentStatusEl.textContent = "수정 저장 중...";
            try {
              const payload = await fetchJson("/api/workspace/component-patch", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  pageId,
                  componentId,
                  sourceId: sourceSelect.value,
                  viewportProfile: pageId === "home" ? selectedViewportProfile : "pc",
                  patch,
                }),
              });
              patchEl.value = JSON.stringify(payload.patch || {}, null, 2);
              componentStatusEl.textContent = "수정 저장 완료";
              await renderDetail();
            } catch (error) {
              componentStatusEl.textContent = "수정 저장 실패: " + String(error);
            }
          });
        });

        detailEl.querySelectorAll("[data-acceptance-bundle]").forEach((row) => {
          const bundleId = row.getAttribute("data-acceptance-bundle");
          const statusSelect = row.querySelector(".acceptance-status-select");
          const noteEl = row.parentElement?.querySelector(".acceptance-note");
          const statusEl = row.parentElement?.querySelector(".acceptance-status");
          const runAcceptanceSave = async (status) => {
            if (!bundleId || !statusEl) return;
            await saveAcceptanceDecision({
              bundleId,
              status,
              note: noteEl?.value || "",
              statusEl,
              currentPageId,
            });
          };
          row.parentElement?.querySelectorAll(".acceptance-note-preset-btn").forEach((button) => {
            button.addEventListener("click", () => {
              if (!noteEl || !statusSelect) return;
              const preset = button.getAttribute("data-note-preset") || "";
              noteEl.value = preset;
              statusSelect.value = "fail";
              statusEl.textContent = `Preset selected: ${preset}`;
            });
            button.addEventListener("dblclick", async () => {
              if (!noteEl || !statusSelect) return;
              const preset = button.getAttribute("data-note-preset") || "";
              noteEl.value = preset;
              statusSelect.value = "fail";
              try {
                await runAcceptanceSave("fail");
              } catch (error) {
                statusEl.textContent = "Acceptance failed: " + String(error);
              }
            });
          });
          row.querySelector(".save-acceptance-btn")?.addEventListener("click", async () => {
            if (!bundleId || !statusSelect || !statusEl) return;
            try {
              await runAcceptanceSave(statusSelect.value);
            } catch (error) {
              statusEl.textContent = "Acceptance failed: " + String(error);
            }
          });
          row.querySelector(".pass-next-acceptance-btn")?.addEventListener("click", async () => {
            if (!bundleId || !statusSelect || !statusEl) return;
            statusSelect.value = "pass";
            try {
              await runAcceptanceSave("pass");
            } catch (error) {
              statusEl.textContent = "Acceptance failed: " + String(error);
            }
          });
          row.querySelector(".fail-save-acceptance-btn")?.addEventListener("click", async () => {
            if (!bundleId || !statusSelect || !statusEl) return;
            statusSelect.value = "fail";
            try {
              await runAcceptanceSave("fail");
            } catch (error) {
              statusEl.textContent = "Acceptance failed: " + String(error);
            }
          });
          noteEl?.addEventListener("keydown", async (event) => {
            if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
              event.preventDefault();
              try {
                await runAcceptanceSave(statusSelect?.value || "pending");
              } catch (error) {
                statusEl.textContent = "Acceptance failed: " + String(error);
              }
              return;
            }
            if (event.altKey && event.key === "Enter") {
              event.preventDefault();
              if (statusSelect) statusSelect.value = "pass";
              try {
                await runAcceptanceSave("pass");
              } catch (error) {
                statusEl.textContent = "Acceptance failed: " + String(error);
              }
              return;
            }
            if (event.shiftKey && event.key === "Enter") {
              event.preventDefault();
              if (statusSelect) statusSelect.value = "fail";
              try {
                await runAcceptanceSave("fail");
              } catch (error) {
                statusEl.textContent = "Acceptance failed: " + String(error);
              }
            }
          });
        });

        detailEl.querySelectorAll(".jump-acceptance-target-btn").forEach((button) => {
          button.addEventListener("click", async () => {
            const targetPageId = button.getAttribute("data-jump-page-id") || "";
            const targetBundleId = button.getAttribute("data-jump-bundle-id") || "";
            await navigateToBundle(targetPageId, targetBundleId);
          });
        });
        detailEl.querySelector("#copyDetailStateBtn")?.addEventListener("click", async () => {
          try {
            await copyCurrentAdminLink();
            showAdminNotice("Page link copied");
          } catch (error) {
            console.error(error);
            showAdminNotice("Copy failed", "error");
          }
        });
        detailEl.querySelectorAll(".review-copy-btn").forEach((button) => {
          button.addEventListener("click", async () => {
            const text = button.getAttribute("data-copy-text") || "";
            const label = button.getAttribute("data-copy-label") || "Review link";
            if (!text) return;
            try {
              await copyText(text);
              showAdminNotice(`${label} copied`);
            } catch (error) {
              console.error(error);
              showAdminNotice("Copy failed", "error");
            }
          });
        });
        detailEl.querySelector("#copySelectedBundleBtn")?.addEventListener("click", async () => {
          if (!selectedBundleId) return;
          try {
            await copyAdminLinkFor(currentPageId, selectedBundleId);
            showAdminNotice(`Bundle link copied: ${selectedBundleId}`);
          } catch (error) {
            console.error(error);
            showAdminNotice("Copy failed", "error");
          }
        });
        detailEl.querySelector("#focusSelectedBundleBtn")?.addEventListener("click", () => {
          if (!selectedBundleId) return;
          focusNextPendingBundle(selectedBundleId);
        });
        detailEl.querySelector("#clearDetailBundleTargetBtn")?.addEventListener("click", async () => {
          selectedBundleId = "";
          syncAdminStateUrl("push");
          renderList();
          await renderDetail();
          showAdminNotice("Bundle target cleared");
        });
        detailEl.querySelector("#focusNextPendingBtn")?.addEventListener("click", () => {
          focusCurrentNextPendingBundle();
        });
        detailEl.querySelector("#jumpNextPendingPageBtn")?.addEventListener("click", async () => {
          await navigateToBundle(currentPageId, "");
        });
        detailEl.querySelector("#copyNextPendingPageBtn")?.addEventListener("click", async () => {
          try {
            await copyAdminLinkFor(currentPageId, "");
            showAdminNotice(`Page link copied: ${currentPageId}`);
          } catch (error) {
            console.error(error);
            showAdminNotice("Copy failed", "error");
          }
        });
        detailEl.querySelector("#copyNextPendingBtn")?.addEventListener("click", async () => {
          const targetBundleId = acceptanceResults?.nextPendingBundle?.bundleId || "";
          if (!targetBundleId) return;
          try {
            await copyAdminLinkFor(currentPageId, targetBundleId);
            showAdminNotice(`Bundle link copied: ${targetBundleId}`);
          } catch (error) {
            console.error(error);
            showAdminNotice("Copy failed", "error");
          }
        });
        detailEl.querySelectorAll(".copy-bundle-link-btn").forEach((button) => {
          button.addEventListener("click", async () => {
            const targetPageId = button.getAttribute("data-copy-page-id") || "";
            const targetBundleId = button.getAttribute("data-copy-bundle-id") || "";
            try {
              await copyAdminLinkFor(targetPageId, targetBundleId);
              showAdminNotice(`Bundle link copied: ${targetBundleId}`);
            } catch (error) {
              console.error(error);
              showAdminNotice("Copy failed", "error");
            }
          });
        });
        detailEl.querySelectorAll(".jump-page-btn").forEach((button) => {
          button.addEventListener("click", async () => {
            const targetPageId = button.getAttribute("data-jump-page-id") || "";
            const targetBundleId = button.getAttribute("data-jump-bundle-id") || "";
            await navigateToBundle(targetPageId, targetBundleId);
          });
        });

        const nextPendingBundleId = acceptanceResults?.nextPendingBundle?.bundleId || "";
        const bundleIdToFocus = selectedBundleId || nextPendingBundleId;
        if (bundleIdToFocus) {
          window.setTimeout(() => {
            focusNextPendingBundle(bundleIdToFocus);
          }, 20);
        }
        if (nextPendingBundleId) {
          const marker = document.createElement("div");
          marker.hidden = true;
          marker.setAttribute("data-next-pending-bundle-id", nextPendingBundleId);
          detailEl.appendChild(marker);
        }
      }

      closePageIdentityModalBtn?.addEventListener("click", closePageIdentityModal);
      cancelPageIdentityBtn?.addEventListener("click", closePageIdentityModal);
      pageIdentityModalEl?.addEventListener("click", (event) => {
        if (event.target === pageIdentityModalEl) closePageIdentityModal();
      });
      closeAuxModalBtn?.addEventListener("click", closeAuxModal);
      auxModalEl?.addEventListener("click", (event) => {
        if (event.target === auxModalEl) closeAuxModal();
      });
      savePageIdentityBtn?.addEventListener("click", async () => {
        const pageId = activePageIdentityPageId;
        if (!pageId) return;
        if (pageIdentityStatusEl) pageIdentityStatusEl.textContent = "저장 중...";
        try {
          await fetchJson("/api/workspace/page-identity", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              pageId,
              role: document.getElementById("identityRole").value || "",
              purpose: document.getElementById("identityPurpose").value || "",
              designIntent: document.getElementById("identityDesignIntent").value || "",
              mustPreserve: textToLines(document.getElementById("identityMustPreserve").value || ""),
              shouldAvoid: textToLines(document.getElementById("identityShouldAvoid").value || ""),
              visualGuardrails: textToLines(document.getElementById("identityGuardrails").value || ""),
            }),
          });
          pageIdentityCacheByPage.delete(pageId);
          if (pageIdentityStatusEl) pageIdentityStatusEl.textContent = "저장 완료";
          showAdminNotice("페이지 정체성 저장 완료");
          await refreshData();
          closePageIdentityModal();
        } catch (error) {
          if (pageIdentityStatusEl) pageIdentityStatusEl.textContent = `저장 실패: ${describeRequestError(error)}`;
        }
      });
      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && pageIdentityModalEl && !pageIdentityModalEl.hidden) {
          closePageIdentityModal();
          return;
        }
        if (event.key === "Escape" && auxModalEl && !auxModalEl.hidden) {
          closeAuxModal();
        }
      });

      document.addEventListener("click", (event) => {
        const helpButton = event.target.closest("[data-help-title]");
        if (!helpButton) return;
        openAuxModal({
          title: helpButton.getAttribute("data-help-title") || "안내",
          meta: "필요할 때만 확인하는 도움말입니다.",
          html: String(helpButton.getAttribute("data-help-content") || "")
            .split("\n")
            .map((line) => line.trim())
            .filter(Boolean)
            .map((line) => `<div class="meta" style="margin-bottom:8px;">${escapeHtml(line)}</div>`)
            .join(""),
        });
      });

      logoutBtn.addEventListener("click", async () => {
        await fetch("/api/auth/logout", { method: "POST" });
        location.href = "/login";
      });

      window.addEventListener("popstate", async () => {
        readAdminStateFromUrl();
        await refreshData();
      });

      readAdminStateFromUrl();
      refreshData().catch((error) => {
        detailEl.textContent = "Failed to load data: " + String(error);
      });
    </script>
  </body>
</html>
