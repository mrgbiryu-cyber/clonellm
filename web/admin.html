        if (page.targetKind === "pdp") {
          const params = new URLSearchParams();
          params.set("pageId", getTargetWorkspacePageId(page));
          if (page.href) params.set("href", page.href);
          if (page.cloneTitle) params.set("title", page.cloneTitle);
          return `/clone-product?${params.toString()}`;
        }
        return `/clone/${encodeURIComponent(getTargetWorkspacePageId(page))}`;
      }

      function buildPreviewTargets(rawPages = []) {
        const pageMap = new Map((rawPages || []).map((page) => [page.id, page]));
        const targets = [];
        for (const spec of adminTargetCatalog) {
          const basePage = pageMap.get(spec.workspacePageId);
          if (!basePage) continue;
          targets.push({
            ...basePage,
            id: spec.id,
            workspacePageId: spec.workspacePageId,
            runtimePageId: spec.runtimePageId || spec.workspacePageId,
            targetKind: spec.targetKind,
            title: spec.displayTitle,
            displayTitle: spec.displayTitle,
            href: spec.href || "",
            cloneTitle: spec.cloneTitle || "",
            previewUrl: buildPreviewTargetUrl({ ...basePage, ...spec }),
            pageGroup: spec.targetKind === "pdp" ? "product-detail" : basePage.pageGroup,
            order: spec.order,
            editingSupported: true,
          });
        }
        return targets.sort((a, b) => Number(a.order || 999) - Number(b.order || 999));
      }

      function createRequestError({ url, status = 0, code = "", detail = "", cause = null }) {
        const error = new Error(detail || code || `Request failed: ${url}`);
        error.url = url;
        error.status = Number(status) || 0;
        error.code = String(code || "").trim();
        error.detail = String(detail || "").trim();
        error.cause = cause || null;
        return error;
      }

      function describeRequestError(error) {
        const status = Number(error?.status || 0);
        const code = String(error?.code || "").trim();
        const detail = String(error?.detail || error?.message || "").trim();
        if (status === 401 || status === 403) {
          return "로그인 세션이 만료되었거나 권한이 없습니다. 새로고침 후 다시 로그인해 주세요.";
        }
        if (status >= 500) {
          return `서버 처리 실패 (${code || status}). ${detail || "PM2 로그를 확인해 주세요."}`;
        }
        if (status > 0) {
          return `요청 실패 (${status}). ${detail || code || "응답 내용을 확인해 주세요."}`;
        }
        if (error?.name === "TypeError") {
          return "서버에 연결하지 못했습니다. 탭 새로고침 후 다시 시도하고, 계속되면 Network 탭과 PM2 로그를 확인해 주세요.";
        }
        return detail || "알 수 없는 요청 오류가 발생했습니다.";
      }

      async function fetchJson(url, options) {
        let response;
        try {
          response = await fetch(url, options);
        } catch (error) {
          throw createRequestError({
            url,
            detail: `network_error: ${String(error?.message || error)}`,
            cause: error,
          });
        }
        let payload = null;
        const rawText = await response.text();
        try {
          payload = rawText ? JSON.parse(rawText) : {};
        } catch {
          payload = { detail: rawText || "invalid_json_response" };
        }
        if (!response.ok) {
          throw createRequestError({
            url,
            status: response.status,
            code: payload?.error || "",
            detail: payload?.detail || payload?.error || `Request failed: ${url}`,
          });
        }
        return payload;
      }

        stopProgressMessages(kind);

        if (!statusEl || !steps.length) return;
        let index = 0;
        statusEl.textContent = steps[0];
        const timerId = window.setInterval(() => {

          statusEl.textContent = steps[index];

      function findNextActionablePageId(excludePageId = "") {
        const states = (finalReadinessMeta?.pages || [])
          .filter((item) => item.pageId !== excludePageId)
          .filter((item) => item.acceptanceStatus === "needs-review" || item.acceptanceStatus === "in-progress")
          .sort((a, b) => {
            const acceptanceOrder = { "needs-review": 0, "in-progress": 1, accepted: 2 };
            const ar = acceptanceOrder[a.acceptanceStatus || "in-progress"] ?? 9;
            const br = acceptanceOrder[b.acceptanceStatus || "in-progress"] ?? 9;
            if (ar !== br) return ar - br;
            const riskDiff = Number(b.maxRiskScore || 0) - Number(a.maxRiskScore || 0);
            if (riskDiff !== 0) return riskDiff;
            const fallbackDiff = Number(b.fallbackComponentCount || 0) - Number(a.fallbackComponentCount || 0);
            if (fallbackDiff !== 0) return fallbackDiff;
            const pendingDiff = Number(b.acceptanceCounts?.pending || 0) - Number(a.acceptanceCounts?.pending || 0);
            if (pendingDiff !== 0) return pendingDiff;
            return String(a.pageId || "").localeCompare(String(b.pageId || ""), "ko");
          });
        return states[0]?.pageId || "";
      }

      function getPageAdvisoryMeta(pageId) {
        const runtimePageId = pages.find((page) => page.id === pageId)?.workspacePageId || pageId;
        const items = Array.isArray(pageAdvisories?.[runtimePageId]) ? pageAdvisories[runtimePageId] : [];
        const severityRank = { error: 3, warning: 2, info: 1 };
        const highestSeverity = items.reduce((current, item) => {
          const nextSeverity = String(item?.severity || "info");
          return (severityRank[nextSeverity] || 0) > (severityRank[current] || 0) ? nextSeverity : current;
        }, "");
        return {
          count: items.length,
          highestSeverity: highestSeverity || "none",
        };
      }

      async function copyText(text) {
        if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(text);
          return text;
        }
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.setAttribute("readonly", "readonly");
        textarea.style.position = "absolute";
        textarea.style.left = "-9999px";
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        textarea.remove();
        return text;
      }

      async function saveAcceptanceDecision({ bundleId, status, note, statusEl, currentPageId }) {
        if (!bundleId || !statusEl) return;
        if (status === "fail" && !String(note || "").trim()) {
          statusEl.textContent = "Fail note is required";
          showAdminNotice("Fail note is required", "error");
          return;
        }
        statusEl.textContent = "Saving acceptance...";
        await fetchJson("/api/workspace/acceptance-result", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            bundleId,
            status,
            note: note || "",
          }),
        });
        await refreshData({ skipDetail: true });
        const currentPageState = (finalReadinessMeta?.pages || []).find((item) => item.pageId === currentPageId);
        if (status === "pass" && currentPageState?.acceptanceStatus === "accepted") {
          selectedId = findNextActionablePageId(currentPageId) || selectedId;
          pendingSelectedId = selectedId;
          selectedBundleId = "";
        }
        syncAdminStateUrl();
        renderList();
        await renderDetail();
        const nextPendingBundleId =
          selectedId === currentPageId
            ? (detailEl.querySelector('[data-next-pending-bundle-id]')?.getAttribute('data-next-pending-bundle-id') || "")
            : "";
        if (nextPendingBundleId) {
          selectedBundleId = nextPendingBundleId;
          syncAdminStateUrl();
          focusNextPendingBundle(nextPendingBundleId);
        } else if (selectedId === currentPageId) {
          selectedBundleId = "";
          syncAdminStateUrl();
        }
        showAdminNotice(`Acceptance saved: ${bundleId} -> ${status}`);
      }

                <div class="meta">Planner/Builder 분리 전까지 유지하는 임시 경로입니다. 가능하면 위 요구사항 정리 단계를 먼저 사용하세요.</div>
                <div class="llm-guide">
                  <strong>예시</strong>
                  <div class="meta">홈 메인 비주얼 제목을 "새로운 봄 혜택"으로 바꿔줘</div>
                  <div class="meta">홈 공간 리뉴얼 섹션 제목을 "우리집 새단장"으로 바꿔줘</div>

                <textarea id="llmPrompt" placeholder="예: 홈 메인 비주얼 설명 문구를 '지금만 가능한 특별 혜택'으로 바꿔줘"></textarea>

            </div>
          </div>
          <div class="section">
            <div><strong>수정 가능한 컴포넌트</strong></div>
            ${isPdpTarget ? `<div class="meta" style="margin-top:8px;">현재 대표 케이스에 보이는 PDP 슬롯만 노출합니다. 변경은 현재 케이스에만 저장됩니다.</div>` : ``}
            <div class="component-grid">
              ${(inventory.components || []).map((component) => {
                const editable = editabilityMap.get(component.componentId) || {};
                const slot = slotMap.get(component.slotId) || { sources: [] };
                const gap = gapMap.get(component.componentId) || null;
                const patchSchema = editable.patchSchema || { rootKeys: [], styleKeys: [] };
                const editableProps = editable.editableProps || [];
                const editableStyles = editable.editableStyles || [];
                return `
                  <div class="component-card" data-component-id="${escapeHtml(component.componentId)}" data-slot-id="${escapeHtml(component.slotId)}" data-page-id="${escapeHtml(component.pageId || workspacePageId)}">
                    <div class="component-title-row">
                      <h4>${escapeHtml(slotLabel(component.slotId))}</h4>
                      <span class="component-label">${escapeHtml(component.componentId)}</span>
                    </div>
                    <div class="meta-row">
                      <span class="chip ${component.hasPatch ? "warn" : "pass"}">${component.hasPatch ? "수정 있음" : "기본 상태"}</span>
                      <span class="chip">${escapeHtml(component.kind || "unknown")}</span>
                      <span class="chip">${escapeHtml(component.containerMode || "n/a")}</span>
                      <span class="chip ${gap ? "warn" : "pass"}">${escapeHtml(gap ? gap.status : "pass")}</span>
                    </div>
                    <div class="component-copy">현재 소스: <code>${escapeHtml(component.activeSourceId || "")}</code> / 렌더 기준: <code>${escapeHtml(component.resolvedRenderSourceId || component.activeSourceId || "")}</code></div>
                    ${component.sourceResolutionDetail ? `<div class="meta">소스 해석: ${escapeHtml(component.sourceResolutionDetail)}</div>` : ""}
                    <div class="meta">수정 가능한 내용</div>
                    ${renderLabelChips(editableProps, editableLabelMap)}
                    <div class="meta" style="margin-top:8px;">조절 가능한 스타일</div>
                    ${renderLabelChips(editableStyles, styleLabelMap)}
                    ${(patchSchema.rootKeys || []).length || (patchSchema.styleKeys || []).length ? `<div class="meta" style="margin-top:8px;">패치 키: root[${escapeHtml((patchSchema.rootKeys || []).join(", ") || "-")}] / style[${escapeHtml((patchSchema.styleKeys || []).join(", ") || "-")}]</div>` : ``}
                    ${Array.isArray(component.advisories) && component.advisories.length ? `<div class="meta">주의사항: ${escapeHtml(component.advisories.map((item) => item.id).join(", "))}</div>` : ``}
                    <div class="component-actions">
                      <select class="source-select">
                        ${(slot.sources || []).map((source) => `
                          <option value="${escapeHtml(source.sourceId)}" ${source.sourceId === component.activeSourceId ? "selected" : ""}>
                            ${escapeHtml(source.sourceId)} (${escapeHtml(sourceTypeLabel(source.sourceType || source.status || ""))})
                          </option>
                        `).join("")}
                      </select>
                      <button type="button" class="btn apply-source-btn">이 소스로 바꾸기</button>
                      <button type="button" class="btn secondary load-patch-btn">저장된 수정 불러오기</button>
                    </div>
                    <textarea class="inline-textarea patch-json" placeholder='예: {"title":"새 제목","subtitle":"보조 설명","styles":{"background":"#fff"}}'></textarea>
                    <div class="component-actions">
                      <button type="button" class="btn apply-patch-btn">직접 수정 저장</button>
                    </div>
                    <div class="component-status">대기 중</div>
                  </div>
                `;
              }).join("")}
            </div>
          </div>
          <details class="fold-section">
            <summary>비교 자료 / 운영 정보</summary>
            <div class="fold-body">
              ${isPdpTarget ? `` : `<div class="section">
                <div><strong>검수 상태</strong></div>
                <div class="meta">page acceptance: ${escapeHtml(acceptanceResults?.overallStatus || "pending")} | pass ${escapeHtml(currentPageAcceptance?.pass || 0)} / ${escapeHtml(currentPageAcceptance?.total || 0)} | fail ${escapeHtml(currentPageAcceptance?.fail || 0)} | pending ${escapeHtml(currentPageAcceptance?.pending || 0)}</div>
                ${acceptanceResults?.nextPendingBundle ? `<div class="meta">next pending bundle: <code>${escapeHtml(acceptanceResults.nextPendingBundle.bundleId)}</code> (${escapeHtml(acceptanceResults.nextPendingBundle.title)})</div>` : `<div class="meta">next pending bundle: none</div>`}
                ${currentFailedBundles.length ? `<div class="meta" style="margin-top:10px;">Current page failed bundles</div><div class="gap-list">${currentFailedBundles.map((bundle) => `<div class="gap-item acceptance-fail"><strong>${escapeHtml(bundle.title)}</strong><div class="meta">bundleId: ${escapeHtml(bundle.bundleId)}</div><div class="meta">${escapeHtml(bundle.note || "no note")}</div></div>`).join("")}</div>` : ``}
              </div>`}
              <div class="section">
                <div><strong>비교 자료</strong></div>
                ${reviewHtml}
              </div>
              ${workspacePageId === "home" ? `<div class="section"><div><strong>홈 링크 현황</strong></div>${homeLinkCoverageHtml}</div>` : ``}
              ${isPdpTarget ? `` : `<div class="section">
                <div><strong>운영 번들</strong></div>
                <div class="meta">Recommended order</div>
                ${allBundlesHtml}
                <div class="meta" style="margin-top:10px;">Current page bundles</div>
                ${bundleHtml}
              </div>`}
            </div>
          </details>
          <details class="fold-section">
            <summary>기술 정보</summary>
            <div class="fold-body">
              <div class="section">
                <div><strong>런타임 범위</strong></div>
                ${runtimeScopeHtml}
              </div>
              <div class="section">
                <div><strong>페이지 주의사항</strong></div>
                ${advisoryHtml}
              </div>
              ${isPdpTarget ? `<div class="section"><div><strong>PDP 연결 상태</strong></div><div class="meta">대표 PDP는 /clone-product 기반으로 보이지만, 수정 내용은 현재 케이스 pageId에 독립 저장됩니다.</div><div class="meta">캡처/selector 기준만 ${escapeHtml(runtimePageId)}를 재사용합니다.</div></div>` : `<div class="section">
                <div><strong>Pre-LLM 상태</strong></div>
                <div class="meta">pre-LLM: ${escapeHtml(gaps.overallStatus)} | component gaps: ${escapeHtml(gaps.componentGapCount || 0)} | fallback components: ${escapeHtml(gaps.fallbackComponentCount || 0)}</div>
                ${gaps.globalGaps?.length ? gaps.globalGaps.map((gap) => `<div class="meta">${escapeHtml(gap)}</div>`).join("") : `<div class="meta">No global gaps.</div>`}
                ${gaps.fallbackComponents?.length ? `<div class="meta">Fallback components</div><div class="gap-list">${gaps.fallbackComponents.map((item) => `<div class="gap-item"><strong>${escapeHtml(item.componentId)}</strong><div class="meta">${escapeHtml(item.sourceResolution)} | ${escapeHtml(item.activeSourceId || "")} -> ${escapeHtml(item.resolvedRenderSourceId || "")}</div>${item.detail ? `<div class="meta">${escapeHtml(item.detail)}</div>` : ``}</div>`).join("")}</div>` : ``}
                ${gapHtml}
              </div>`}
              <div class="section">
                <div><strong>배치 상태</strong></div>
                ${visualBatch ? `
                  <div class="meta">status: ${escapeHtml(visualBatch.overallStatus || "unknown")}</div>
                  <div class="meta">generatedAt: ${escapeHtml(visualBatch.generatedAt || "n/a")}</div>
                  <div class="meta">homeLower sections: ${escapeHtml(visualBatch.artifacts?.homeLower?.sectionCount || 0)}</div>
                  <div class="meta">service captures: ${escapeHtml(visualBatch.artifacts?.servicePages?.captureCount || 0)} | errors: ${escapeHtml(visualBatch.artifacts?.servicePages?.errorCount || 0)}</div>
                  <div class="meta">plp captures: ${escapeHtml(visualBatch.artifacts?.plp?.captureCount || 0)} | errors: ${escapeHtml(visualBatch.artifacts?.plp?.errorCount || 0)}</div>
                ` : `<div class="meta">visual batch summary pending</div>`}
              </div>
            </div>
          </details>
        `;

        const plannerRunBtn = document.getElementById("runPlanner");
        const plannerStatusEl = document.getElementById("plannerStatus");
        const savePlanBtn = document.getElementById("savePlanBtn");
        const planSaveStatusEl = document.getElementById("planSaveStatus");
        const plannerDraftRegionEl = document.getElementById("plannerDraftRegion");
        const plannerLoadingBoxEl = document.getElementById("plannerLoadingBox");
        const plannerDraftFormEl = document.getElementById("plannerDraftForm");
        const builderLoadingBoxEl = document.getElementById("builderLoadingBox");
        const runBtn = document.getElementById("runLlm");
        const resetWorkspaceBtn = document.getElementById("resetWorkspaceBtn");
        const promptEl = document.getElementById("llmPrompt");
        const legacyStatusEl = document.getElementById("llmStatus");
        if (runBtn && legacyStatusEl) {
          runBtn.disabled = false;
          runBtn.title = "";
          legacyStatusEl.textContent = "대기 중";
        }
        if (plannerStatusEl) plannerStatusEl.textContent = "대기 중";

        const collectPlanTargetSelection = () => {
          const componentOnly = Boolean(document.getElementById("planComponentOnly")?.checked);
          const targetComponents = Array.from(detailEl.querySelectorAll('input[name="planTargetComponent"]:checked'))
            .map((input) => String(input.value || "").trim())
            .filter(Boolean);
          return {
            targetScope: componentOnly ? "components" : "page",
            targetComponents,
          };
        };

        const updatePlannerTargetUi = () => {
          const componentOnly = Boolean(document.getElementById("planComponentOnly")?.checked);
          const plannerTargetBoxEl = document.getElementById("plannerTargetBox");
          if (plannerTargetBoxEl) plannerTargetBoxEl.hidden = !componentOnly;
        };

        const updatePlanModeUi = () => {
          const planMode = document.getElementById("planMode")?.value || "hybrid";
          const fieldConfig = {
            hybrid: ["reference", "preferred", "tone", "key", "avoid", "request"],
            direct: ["key", "avoid", "request"],
            reference: ["preferred", "avoid", "reference"],
          };
          const visibleFields = fieldConfig[planMode] || fieldConfig.hybrid;
          detailEl.querySelectorAll("[data-plan-field]").forEach((fieldEl) => {
            const fieldId = fieldEl.getAttribute("data-plan-field") || "";
            const order = visibleFields.indexOf(fieldId);
            fieldEl.hidden = order < 0;
            fieldEl.style.order = order >= 0 ? String(order + 1) : "";
          });
        };

        const showPlannerLoadingState = (statusText) => {
          plannerUiStateByPage.set(workspacePageId, { draftVisible: true, loading: true });
          if (plannerDraftRegionEl) plannerDraftRegionEl.hidden = false;
          if (plannerLoadingBoxEl) plannerLoadingBoxEl.hidden = false;
          if (plannerDraftFormEl) plannerDraftFormEl.hidden = true;
          startProgressMessages("planner", plannerStatusEl, [
            statusText || "기획안 생성 중입니다.",
            "기획안 생성 중입니다. 요청 내용을 해석하고 있습니다.",
            "기획안 생성 중입니다. 명칭과 요구사항을 정리하고 있습니다.",
            "기획안 생성 중입니다. 기획 방향과 디자인 방향을 구조화하고 있습니다.",
            "잠시만 기다려주십시오. 정리본을 마무리하고 있습니다.",
          ]);
        };

        const showPlannerDraftState = () => {
          stopProgressMessages("planner");
          plannerUiStateByPage.set(workspacePageId, { draftVisible: true, loading: false });
          if (plannerDraftRegionEl) plannerDraftRegionEl.hidden = false;
          if (plannerLoadingBoxEl) plannerLoadingBoxEl.hidden = true;
          if (plannerDraftFormEl) plannerDraftFormEl.hidden = false;
        };

        const showBuilderLoadingState = () => {
          builderUiStateByPage.set(workspacePageId, { loading: true });
          if (builderLoadingBoxEl) builderLoadingBoxEl.hidden = false;
        };

        const showBuilderIdleState = () => {
          stopProgressMessages("builder");
          builderUiStateByPage.set(workspacePageId, { loading: false });
          if (builderLoadingBoxEl) builderLoadingBoxEl.hidden = true;
        };

        const collectCurrentRequirementPlan = () => ({
          title: (document.getElementById("planTitle")?.value || "").trim(),
          designChangeLevel: document.getElementById("planDesignChangeLevel")?.value || latestRequirementPlan?.designChangeLevel || "medium",
          requestSummary: textToLines(document.getElementById("planRequestSummary")?.value || ""),
          planningDirection: textToLines(document.getElementById("planPlanningDirection")?.value || ""),
          designDirection: textToLines(document.getElementById("planDesignDirection")?.value || ""),
          priority: textToPriority(document.getElementById("planPriority")?.value || ""),
          guardrails: textToLines(document.getElementById("planGuardrails")?.value || ""),
          referenceNotes: latestRequirementPlan?.referenceNotes || [],
          builderBrief: {
            objective: (document.getElementById("planBuilderObjective")?.value || "").trim(),
            mustKeep: textToLines(document.getElementById("planBuilderMustKeep")?.value || ""),
            mustChange: textToLines(document.getElementById("planBuilderMustChange")?.value || ""),
            suggestedFocusSlots: (document.getElementById("planBuilderFocusSlots")?.value || "")
              .split(",")
              .map((item) => item.trim())
              .filter(Boolean),
          },
        });

        const persistCurrentPlanDraft = async () => {
          if (!latestPlan) {
            throw new Error("저장할 정리본이 없습니다.");
          }
          const requirementPlan = collectCurrentRequirementPlan();
          const currentDesignChangeLevel = document.getElementById("planDesignChangeLevel")?.value || requirementPlan.designChangeLevel || "medium";
          if (!requirementPlan.title) {
            throw new Error("기획안 제목은 필요합니다.");
          }
          const item = await fetchJson("/api/workspace/plan", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              id: latestPlan.id,
              pageId: workspacePageId,
              viewportProfile: latestPlan.viewportProfile || "pc",
              mode: latestPlan.mode || "hybrid",
              status: latestPlan.status || "draft",
              title: requirementPlan.title,
              summary: requirementPlan.title,
              input: {
                ...(latestPlan.input || {}),
                userInput: {
                  ...((latestPlan.input && latestPlan.input.userInput) || {}),
                  designChangeLevel: currentDesignChangeLevel,
                },
              },
              output: {
                requirementPlan,
                toolContext: latestToolContext || {},
              },
            }),
          });
          return { item, requirementPlan };
        };

        const runBuilderWorkflow = async () => {
          if (!latestPlan) {
            if (builderStatusEl) builderStatusEl.textContent = "기획 초안이 필요합니다.";
            return;
          }
          const { targetScope, targetComponents } = collectPlanTargetSelection();
          if (targetScope === "components" && !targetComponents.length) {
            if (builderStatusEl) builderStatusEl.textContent = "컴포넌트 범위를 선택했다면 최소 1개는 체크해야 합니다.";
            return;
          }
          const versionLabelHint = (document.getElementById("builderVersionLabelHint")?.value || "").trim();
          const approvedPlan = latestRequirementPlan ? collectCurrentRequirementPlan() : null;
          const designChangeLevel = document.getElementById("planDesignChangeLevel")?.value || approvedPlan?.designChangeLevel || latestPlanUserInput?.designChangeLevel || "medium";
          const intensityMap = {
            low: "conservative",
            medium: "balanced",
            high: "bold",
          };
          const intensity = intensityMap[designChangeLevel] || "balanced";
          if (!approvedPlan) {
            if (builderStatusEl) builderStatusEl.textContent = "기획 초안이 필요합니다.";
            return;
          }
          showBuilderLoadingState();
          startProgressMessages("builder", builderStatusEl, [
            "디자인 생성 중입니다.",
            "디자인 생성 중입니다. 승인된 기획안을 빌더 입력으로 변환하고 있습니다.",
            "디자인 생성 중입니다. 적용 가능한 컴포넌트와 변경 범위를 검토하고 있습니다.",
            "디자인 생성 중입니다. 실제 변경 operation을 구성하고 있습니다.",
            "잠시만 기다려주십시오. 생성 결과를 정리하고 있습니다.",
          ]);
          try {
            const payload = await fetchJson("/api/llm/build", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                pageId: workspacePageId,
                viewportProfile: "pc",
                planId: latestPlan.id,
                approvedPlan,
                intensity,
                versionLabelHint,
                designChangeLevel,
                targetScope,
                targetComponents,
              }),
            });
            showBuilderIdleState();
            if (builderStatusEl) builderStatusEl.textContent = payload.summary || "디자인 생성 완료";
            showAdminNotice("디자인 생성 완료");
            await rerenderDetailWithFocus({ selector: "#builderResultSection", behavior: "smooth", block: "start" });
          } catch (error) {
            showBuilderIdleState();
            if (builderStatusEl) builderStatusEl.textContent = "디자인 생성 실패: " + String(error);
          }
        };

        document.getElementById("planMode")?.addEventListener("change", updatePlanModeUi);
        document.getElementById("planComponentOnly")?.addEventListener("change", updatePlannerTargetUi);
        updatePlanModeUi();
        updatePlannerTargetUi();

        if (resetWorkspaceBtn) {
          resetWorkspaceBtn.addEventListener("click", async () => {
            if (plannerStatusEl) plannerStatusEl.textContent = "작업본 초기화 중...";
            if (legacyStatusEl) legacyStatusEl.textContent = "작업본 초기화 중...";
            try {
              await fetchJson("/api/workspace/reset", { method: "POST" });
              await refreshData();
              if (plannerStatusEl) plannerStatusEl.textContent = "공용 기본값으로 초기화됨";
              if (legacyStatusEl) legacyStatusEl.textContent = "공용 기본값으로 초기화됨";
            } catch (error) {
              if (plannerStatusEl) plannerStatusEl.textContent = "초기화 실패: " + String(error);
              if (legacyStatusEl) legacyStatusEl.textContent = "초기화 실패: " + String(error);
            }
          });
        }

        plannerRunBtn?.addEventListener("click", async () => {
          const planModeEl = document.getElementById("planMode");
          const planRequestTextEl = document.getElementById("planRequestText");
          const planKeyMessageEl = document.getElementById("planKeyMessage");
          const planPreferredDirectionEl = document.getElementById("planPreferredDirection");
          const planAvoidDirectionEl = document.getElementById("planAvoidDirection");
          const planToneAndMoodEl = document.getElementById("planToneAndMood");
          const planReferenceUrlsEl = document.getElementById("planReferenceUrls");
          const { targetScope, targetComponents } = collectPlanTargetSelection();
          const mode = planModeEl?.value || "hybrid";
          const rawRequestText = (planRequestTextEl?.value || "").trim();
          const rawKeyMessage = (planKeyMessageEl?.value || "").trim();
          const rawPreferredDirection = (planPreferredDirectionEl?.value || "").trim();
          const rawAvoidDirection = (planAvoidDirectionEl?.value || "").trim();
          const rawToneAndMood = (planToneAndMoodEl?.value || "").trim();
          const rawReferenceUrls = textToLines(planReferenceUrlsEl?.value || "");
          const designChangeLevel = document.getElementById("planDesignChangeLevel")?.value || "medium";
          const requestText = mode === "reference" ? "" : rawRequestText;
          const keyMessage = mode === "reference" ? "" : rawKeyMessage;
          const preferredDirection = mode === "direct" ? "" : rawPreferredDirection;
          const avoidDirection = rawAvoidDirection;
          const toneAndMood = mode === "hybrid" ? rawToneAndMood : "";
          const referenceUrls = mode === "direct" ? [] : rawReferenceUrls;
          if (targetScope === "components" && !targetComponents.length) {
            if (plannerStatusEl) plannerStatusEl.textContent = "선택한 컴포넌트만 진행하려면 최소 1개는 체크해야 합니다.";
            return;
          }
          if (!requestText && !referenceUrls.length) {
            if (plannerStatusEl) plannerStatusEl.textContent = "고객 요청 또는 레퍼런스 URL 중 하나는 필요합니다.";
            return;
          }
          showPlannerLoadingState("기획안 생성 중...");
          try {
            const payload = await fetchJson("/api/llm/plan", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                pageId: workspacePageId,
                viewportProfile: "pc",
                mode,
                requestText,
                keyMessage,
                preferredDirection,
                avoidDirection,
                toneAndMood,
                referenceUrls,
                designChangeLevel,
                targetScope,
                targetComponents,
              }),
            });
            plannerUiStateByPage.set(workspacePageId, { draftVisible: true, loading: false });
            if (plannerStatusEl) plannerStatusEl.textContent = payload.summary || "기획안 생성 완료";
            showAdminNotice("기획안 생성 완료");
            await rerenderDetailWithFocus({ selector: "#plannerDraftRegion", behavior: "smooth", block: "start" });
          } catch (error) {
            console.error("[planner] plan request failed", {
              pageId: workspacePageId,
              error,
              status: error?.status || 0,
              code: error?.code || "",
              detail: error?.detail || String(error),
            });
            showPlannerDraftState();
            if (plannerStatusEl) plannerStatusEl.textContent = "기획안 생성 실패: " + describeRequestError(error);
          }
        });

        savePlanBtn?.addEventListener("click", async () => {
          if (planSaveStatusEl) planSaveStatusEl.textContent = "정리본 저장 중...";
          try {
            await persistCurrentPlanDraft();
            if (planSaveStatusEl) planSaveStatusEl.textContent = "정리본 저장 완료";
            showAdminNotice("정리본 저장 완료");
            await rerenderDetailWithFocus({ selector: "#plannerDraftRegion", behavior: "smooth", block: "start" });
          } catch (error) {
            if (planSaveStatusEl) planSaveStatusEl.textContent = "정리본 저장 실패: " + String(error);
          }
        });

        const runBuilderBtn = document.getElementById("runBuilder");
        const builderStatusEl = document.getElementById("builderStatus");
        const saveVersionBtn = document.getElementById("saveVersionBtn");
        const versionStatusEl = document.getElementById("versionStatus");

        runBuilderBtn?.addEventListener("click", async () => {
          await runBuilderWorkflow();
        });

        saveVersionBtn?.addEventListener("click", async () => {
          if (!latestDraftBuild) {
            if (versionStatusEl) versionStatusEl.textContent = "저장할 draft build가 없습니다.";
            return;
          }
          if (versionStatusEl) versionStatusEl.textContent = "버전 저장 중...";
          try {
            const item = await fetchJson("/api/workspace/version-save", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                pageId: workspacePageId,
                viewportProfile: latestDraftBuild.viewportProfile || "pc",
                planId: latestDraftBuild.planId || latestPlan?.id || "",
                buildId: latestDraftBuild.id,
                versionLabel: latestDraftBuild.proposedVersionLabel || `${workspacePageId}-draft-v1`,
                summary: latestDraftBuild.summary || "",
                snapshotData: latestDraftBuild.snapshotData || {},
              }),
            });
            if (versionStatusEl) versionStatusEl.textContent = `버전 저장 완료: ${item.item?.versionLabel || item.item?.id || "saved"}`;
            showAdminNotice("새 버전 저장 완료");
            await rerenderDetailWithFocus({ selector: "#builderWorkflowSection", behavior: "smooth", block: "start" });
          } catch (error) {
            if (versionStatusEl) versionStatusEl.textContent = "버전 저장 실패: " + String(error);
          }
        });

        detailEl.querySelectorAll(".pin-version-btn").forEach((button) => {
          button.addEventListener("click", async () => {
            const versionId = button.getAttribute("data-version-id") || "";
            if (!versionId) return;
            if (versionStatusEl) versionStatusEl.textContent = "현재 View 고정 중...";
            try {
              await fetchJson("/api/workspace/view-pin", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  pageId: workspacePageId,
                  versionId,
                }),
              });
              if (versionStatusEl) versionStatusEl.textContent = `현재 View 고정 완료: ${versionId}`;
              showAdminNotice("현재 View 고정 완료");
              await rerenderDetailWithFocus({ selector: "#builderWorkflowSection", behavior: "smooth", block: "start" });
            } catch (error) {
              if (versionStatusEl) versionStatusEl.textContent = "현재 View 고정 실패: " + String(error);
            }
          });
        });

        runBtn?.addEventListener("click", async () => {
          const prompt = (promptEl.value || "").trim();
          if (!prompt) {
            legacyStatusEl.textContent = "요청 문구를 입력해야 한다";
            return;
          }
          const contextualPrompt = isPdpTarget
            ? `현재 작업 대상은 ${pageLabel(page.id, page.title)}이며, 실제 적용 pageId는 ${workspacePageId} 입니다. 이 요청은 현재 대표 PDP 케이스에만 독립 저장해야 합니다. 캡처 기준 페이지는 ${runtimePageId} 이며 PDP 관련 슬롯(gallery, summary, price, option, sticky, review, qna)을 우선 고려하세요. 사용자 요청: ${prompt}`
            : `현재 작업 대상 pageId는 ${workspacePageId} 입니다. 사용자 요청: ${prompt}`;
          legacyStatusEl.textContent = "AI 적용 중...";
          try {
            const response = await fetch("/api/llm/change", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ prompt: contextualPrompt }),
            });
            const payload = await response.json();
            if (!response.ok) {
              legacyStatusEl.textContent = `실패: ${payload.detail || payload.error}`;
              return;
            }
            legacyStatusEl.textContent = payload.summary || "적용 완료";
            await refreshData();
          } catch (error) {
            legacyStatusEl.textContent = "실패: " + String(error);
          }
        });

        detailEl.querySelectorAll(".component-card").forEach((card) => {
          const pageId = card.dataset.pageId;
          const componentId = card.dataset.componentId;
          const slotId = card.dataset.slotId;
          const sourceSelect = card.querySelector(".source-select");
          const patchEl = card.querySelector(".patch-json");
          const componentStatusEl = card.querySelector(".component-status");

          card.querySelector(".apply-source-btn")?.addEventListener("click", async () => {
            componentStatusEl.textContent = "소스 적용 중...";
            try {
              await fetchJson("/api/workspace/slot-source", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ pageId, slotId, sourceId: sourceSelect.value }),
              });
              componentStatusEl.textContent = `소스 적용 완료: ${sourceSelect.value}`;
              await renderDetail();
            } catch (error) {
              componentStatusEl.textContent = "소스 적용 실패: " + String(error);
            }
          });

          card.querySelector(".load-patch-btn")?.addEventListener("click", async () => {
            componentStatusEl.textContent = "저장된 수정 불러오는 중...";
            try {
              const payload = await fetchJson(`/api/workspace/component-patches?pageId=${encodeURIComponent(pageId)}&componentId=${encodeURIComponent(componentId)}&sourceId=${encodeURIComponent(sourceSelect.value)}`);
              patchEl.value = payload.patch ? JSON.stringify(payload.patch, null, 2) : "";
              componentStatusEl.textContent = payload.patch ? "저장된 수정 불러옴" : "저장된 수정 없음";
            } catch (error) {
              componentStatusEl.textContent = "불러오기 실패: " + String(error);
            }
          });

          card.querySelector(".apply-patch-btn")?.addEventListener("click", async () => {
            let patch = {};
            try {
              patch = patchEl.value.trim() ? JSON.parse(patchEl.value) : {};
            } catch (error) {
              componentStatusEl.textContent = "수정 JSON 형식이 올바르지 않음";
              return;
            }
            componentStatusEl.textContent = "수정 저장 중...";
            try {
              const payload = await fetchJson("/api/workspace/component-patch", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ pageId, componentId, sourceId: sourceSelect.value, patch }),
              });
              patchEl.value = JSON.stringify(payload.patch || {}, null, 2);
              componentStatusEl.textContent = "수정 저장 완료";
              await renderDetail();
            } catch (error) {
              componentStatusEl.textContent = "수정 저장 실패: " + String(error);
            }
          });
        });

        detailEl.querySelectorAll("[data-acceptance-bundle]").forEach((row) => {
          const bundleId = row.getAttribute("data-acceptance-bundle");
          const statusSelect = row.querySelector(".acceptance-status-select");
          const noteEl = row.parentElement?.querySelector(".acceptance-note");
          const statusEl = row.parentElement?.querySelector(".acceptance-status");
          const runAcceptanceSave = async (status) => {
            if (!bundleId || !statusEl) return;
            await saveAcceptanceDecision({
              bundleId,
              status,
              note: noteEl?.value || "",
              statusEl,
              currentPageId,
            });
          };
          row.parentElement?.querySelectorAll(".acceptance-note-preset-btn").forEach((button) => {
            button.addEventListener("click", () => {
              if (!noteEl || !statusSelect) return;
              const preset = button.getAttribute("data-note-preset") || "";
              noteEl.value = preset;
              statusSelect.value = "fail";
              statusEl.textContent = `Preset selected: ${preset}`;
            });
            button.addEventListener("dblclick", async () => {
              if (!noteEl || !statusSelect) return;
              const preset = button.getAttribute("data-note-preset") || "";
              noteEl.value = preset;
              statusSelect.value = "fail";
              try {
                await runAcceptanceSave("fail");
              } catch (error) {
                statusEl.textContent = "Acceptance failed: " + String(error);
              }
            });
          });
          row.querySelector(".save-acceptance-btn")?.addEventListener("click", async () => {
            if (!bundleId || !statusSelect || !statusEl) return;
            try {
              await runAcceptanceSave(statusSelect.value);
            } catch (error) {
              statusEl.textContent = "Acceptance failed: " + String(error);
            }
          });
          row.querySelector(".pass-next-acceptance-btn")?.addEventListener("click", async () => {
            if (!bundleId || !statusSelect || !statusEl) return;
            statusSelect.value = "pass";
            try {
              await runAcceptanceSave("pass");
            } catch (error) {
              statusEl.textContent = "Acceptance failed: " + String(error);
            }
          });
          row.querySelector(".fail-save-acceptance-btn")?.addEventListener("click", async () => {
            if (!bundleId || !statusSelect || !statusEl) return;
            statusSelect.value = "fail";
            try {
              await runAcceptanceSave("fail");
            } catch (error) {
              statusEl.textContent = "Acceptance failed: " + String(error);
            }
          });
          noteEl?.addEventListener("keydown", async (event) => {
            if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
              event.preventDefault();
              try {
                await runAcceptanceSave(statusSelect?.value || "pending");
              } catch (error) {
                statusEl.textContent = "Acceptance failed: " + String(error);
              }
              return;
            }
            if (event.altKey && event.key === "Enter") {
              event.preventDefault();
              if (statusSelect) statusSelect.value = "pass";
              try {
                await runAcceptanceSave("pass");
              } catch (error) {
                statusEl.textContent = "Acceptance failed: " + String(error);
              }
              return;
            }
            if (event.shiftKey && event.key === "Enter") {
              event.preventDefault();
              if (statusSelect) statusSelect.value = "fail";
              try {
                await runAcceptanceSave("fail");
              } catch (error) {
                statusEl.textContent = "Acceptance failed: " + String(error);
              }
            }
          });
        });

        detailEl.querySelectorAll(".jump-acceptance-target-btn").forEach((button) => {
          button.addEventListener("click", async () => {
            const targetPageId = button.getAttribute("data-jump-page-id") || "";
            const targetBundleId = button.getAttribute("data-jump-bundle-id") || "";
            await navigateToBundle(targetPageId, targetBundleId);
          });
        });
        detailEl.querySelector("#copyDetailStateBtn")?.addEventListener("click", async () => {
          try {
            await copyCurrentAdminLink();
            showAdminNotice("Page link copied");
          } catch (error) {
            console.error(error);
            showAdminNotice("Copy failed", "error");
          }
        });
        detailEl.querySelectorAll(".review-copy-btn").forEach((button) => {
          button.addEventListener("click", async () => {
            const text = button.getAttribute("data-copy-text") || "";
            const label = button.getAttribute("data-copy-label") || "Review link";
            if (!text) return;
            try {
              await copyText(text);
              showAdminNotice(`${label} copied`);
            } catch (error) {
              console.error(error);
              showAdminNotice("Copy failed", "error");
            }
          });
        });
        detailEl.querySelector("#copySelectedBundleBtn")?.addEventListener("click", async () => {
          if (!selectedBundleId) return;
          try {
            await copyAdminLinkFor(currentPageId, selectedBundleId);
            showAdminNotice(`Bundle link copied: ${selectedBundleId}`);
          } catch (error) {
            console.error(error);
            showAdminNotice("Copy failed", "error");
          }
        });
        detailEl.querySelector("#focusSelectedBundleBtn")?.addEventListener("click", () => {
          if (!selectedBundleId) return;
          focusNextPendingBundle(selectedBundleId);
        });
        detailEl.querySelector("#clearDetailBundleTargetBtn")?.addEventListener("click", async () => {
          selectedBundleId = "";
          syncAdminStateUrl("push");
          renderList();
          await renderDetail();
          showAdminNotice("Bundle target cleared");
        });
        detailEl.querySelector("#focusNextPendingBtn")?.addEventListener("click", () => {
          focusCurrentNextPendingBundle();
        });
        detailEl.querySelector("#jumpNextPendingPageBtn")?.addEventListener("click", async () => {
          await navigateToBundle(currentPageId, "");
        });
        detailEl.querySelector("#copyNextPendingPageBtn")?.addEventListener("click", async () => {
          try {
            await copyAdminLinkFor(currentPageId, "");
            showAdminNotice(`Page link copied: ${currentPageId}`);
          } catch (error) {
            console.error(error);
            showAdminNotice("Copy failed", "error");
          }
        });
        detailEl.querySelector("#copyNextPendingBtn")?.addEventListener("click", async () => {
          const targetBundleId = acceptanceResults?.nextPendingBundle?.bundleId || "";
          if (!targetBundleId) return;
          try {
            await copyAdminLinkFor(currentPageId, targetBundleId);
            showAdminNotice(`Bundle link copied: ${targetBundleId}`);
          } catch (error) {
            console.error(error);
            showAdminNotice("Copy failed", "error");
          }
        });
        detailEl.querySelectorAll(".copy-bundle-link-btn").forEach((button) => {
          button.addEventListener("click", async () => {
            const targetPageId = button.getAttribute("data-copy-page-id") || "";
            const targetBundleId = button.getAttribute("data-copy-bundle-id") || "";
            try {
              await copyAdminLinkFor(targetPageId, targetBundleId);
              showAdminNotice(`Bundle link copied: ${targetBundleId}`);
            } catch (error) {
              console.error(error);
              showAdminNotice("Copy failed", "error");
            }
          });
        });
        detailEl.querySelectorAll(".jump-page-btn").forEach((button) => {
          button.addEventListener("click", async () => {
            const targetPageId = button.getAttribute("data-jump-page-id") || "";
            const targetBundleId = button.getAttribute("data-jump-bundle-id") || "";
            await navigateToBundle(targetPageId, targetBundleId);
          });
        });

        const nextPendingBundleId = acceptanceResults?.nextPendingBundle?.bundleId || "";
        const bundleIdToFocus = selectedBundleId || nextPendingBundleId;
        if (bundleIdToFocus) {
          window.setTimeout(() => {
            focusNextPendingBundle(bundleIdToFocus);
          }, 20);
        }
        if (nextPendingBundleId) {
          const marker = document.createElement("div");
          marker.hidden = true;
          marker.setAttribute("data-next-pending-bundle-id", nextPendingBundleId);
          detailEl.appendChild(marker);
        }
      }

      logoutBtn.addEventListener("click", async () => {
        await fetch("/api/auth/logout", { method: "POST" });
        location.href = "/login";
      });

      window.addEventListener("popstate", async () => {
        readAdminStateFromUrl();
        await refreshData();
      });

      readAdminStateFromUrl();
      refreshData().catch((error) => {
        detailEl.textContent = "Failed to load data: " + String(error);
      });
    </script>
  </body>
</html>
