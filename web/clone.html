<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clone | LGE Prototype</title>
    <style>
      :root {
        --bg: #f2f4f8;
        --panel: #ffffff;
        --ink: #101828;
        --muted: #5d6678;
        --line: #e4e9f2;
        --primary: #c60c30;
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: Arial, sans-serif; color: var(--ink); background: linear-gradient(180deg, #f8fafc, #eef2f7); }
      header { position: sticky; top: 0; z-index: 10; backdrop-filter: blur(12px); background: rgba(10, 18, 34, 0.88); color: #fff; border-bottom: 1px solid rgba(255,255,255,0.08); }
      .bar { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; }
      .bar a { color: #fff; text-decoration: none; }
      .wrap { max-width: 1200px; margin: 0 auto; padding: 18px; }
      .hero { background: var(--panel); border: 1px solid var(--line); border-radius: 18px; overflow: hidden; box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08); }
      .hero img { width: 100%; height: min(36vw, 420px); object-fit: cover; display: block; }
      .hero-copy { padding: 18px 20px; display: flex; justify-content: space-between; gap: 16px; align-items: end; }
      .hero-copy h1 { margin: 0 0 8px; font-size: clamp(28px, 3vw, 44px); line-height: 1.05; }
      .hero-copy p { margin: 0; color: var(--muted); max-width: 760px; }
      .cta { display: inline-block; background: var(--primary); color: #fff; padding: 11px 14px; border-radius: 10px; text-decoration: none; font-weight: 700; white-space: nowrap; }
      .section { margin-top: 18px; background: var(--panel); border: 1px solid var(--line); border-radius: 16px; padding: 18px; box-shadow: 0 12px 32px rgba(15, 23, 42, 0.05); }
      .section-title { margin: 0 0 12px; font-size: 18px; }
      .chips { display: flex; flex-wrap: wrap; gap: 8px; }
      .chip { border: 1px solid #d7dce7; background: #fff; color: #283244; padding: 8px 10px; border-radius: 999px; text-decoration: none; font-size: 13px; }
      .chip.is-link { background: #fff5f7; border-color: #f1c7d1; color: #8f1833; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 12px; }
      .card { border: 1px solid var(--line); border-radius: 14px; overflow: hidden; background: #fff; }
      .card img { width: 100%; aspect-ratio: 16 / 10; object-fit: cover; display: block; background: #eef2f7; }
      .card-body { padding: 12px; }
      .meta { font-size: 12px; color: var(--muted); }
      .clone-blocks { display: grid; gap: 12px; }
      .clone-block { border: 1px dashed #d8deea; border-radius: 14px; padding: 14px; background: linear-gradient(180deg, #ffffff, #f7f9fc); }
      .clone-block h3 { margin: 0 0 6px; font-size: 16px; }
      .clone-block p { margin: 0; color: var(--muted); }
      @media (max-width: 768px) {
        .hero-copy { display: block; }
        .cta { margin-top: 12px; }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="bar">
        <a href="/preview"><strong>LGE Clone View</strong></a>
        <a href="/admin">Open Admin</a>
      </div>
    </header>
    <main class="wrap" id="app">Loading...</main>
    <script>
      const app = document.getElementById("app");
      const pageId = decodeURIComponent(location.pathname.split("/clone/")[1] || "");

      function fallbackText(headings) {
        if (!headings || !headings.length) return "Captured clone view generated from archived structure and local assets.";
        return headings.slice(0, 4).map((item) => item.text).join(" · ");
      }

      function renderSectionBlock(section, index) {
        const copyMap = {
          "global-header": "Global navigation preserved as a fixed section.",
          "hero-banner": "Primary campaign visual and headline zone.",
          "promo-carousel": "Promotional content area reconstructed from captured assets.",
          "product-card-grid": "Product grid or recommendation block derived from collected page structure.",
          "cta-banner": "High-emphasis call-to-action block.",
          "category-nav": "Category navigation area for browsing product families.",
          "filter-sort-bar": "Filter and sort area from the original category layout.",
          "price-benefit-panel": "Benefits and pricing communication section.",
          "support-shortcuts": "Shortcut block for reservation, manuals, and support actions.",
        };
        return `
          <article class="clone-block">
            <h3>${index + 1}. ${section.name}</h3>
            <div class="meta">${section.componentType}</div>
            <p>${copyMap[section.componentType] || "Captured section placeholder for later component-level reconstruction."}</p>
          </article>
        `;
      }

      fetch(`/api/clone-page?id=${encodeURIComponent(pageId)}`)
        .then((r) => r.json())
        .then((page) => {
          if (page.error) {
            app.innerHTML = `<h1>Page not found</h1><p>${pageId}</p>`;
            return;
          }
          app.innerHTML = `
            <section class="hero">
              ${page.heroImage ? `<img src="${page.heroImage}" alt="${page.title || page.id}" />` : ""}
              <div class="hero-copy">
                <div>
                  <div class="meta">${page.pageGroup}</div>
                  <h1>${page.archiveTitle || page.title || page.id}</h1>
                  <p>${fallbackText(page.sourceHeadings)}</p>
                </div>
                <a class="cta" href="${(page.linkCards && page.linkCards[0]) ? `/clone/${page.linkCards[0].id}` : `/p/${page.id}`}">Open Primary Path</a>
              </div>
            </section>

            <section class="section">
              <h2 class="section-title">Connected Pages</h2>
              <div class="grid">
                ${(page.linkCards || []).map((card) => `
                  <article class="card">
                    ${card.heroImage ? `<img src="${card.heroImage}" alt="${card.title}" />` : `<div style="aspect-ratio:16/10;background:#eef2f7"></div>`}
                    <div class="card-body">
                      <div><strong>${card.title}</strong></div>
                      <div class="meta">${card.pageGroup}</div>
                      <div style="margin-top:8px"><a class="chip" href="/clone/${card.id}">Open</a></div>
                    </div>
                  </article>
                `).join("")}
              </div>
            </section>

            <section class="section">
              <h2 class="section-title">Captured Sections</h2>
              <div class="clone-blocks">
                ${(page.sections || [])
                  .filter((section) => section.visible !== false)
                  .sort((a, b) => a.order - b.order)
                  .map(renderSectionBlock)
                  .join("")}
              </div>
            </section>

            <section class="section">
              <h2 class="section-title">Captured Visual Assets</h2>
              <div class="grid">
                ${(page.gallery || []).map((asset) => `
                  <article class="card">
                    <img src="${asset.src}" alt="${asset.alt || page.title}" />
                    <div class="card-body">
                      <div class="meta">${asset.alt || "visual asset"}</div>
                    </div>
                  </article>
                `).join("") || `<div class="meta">No gallery assets available.</div>`}
              </div>
            </section>

            <section class="section">
              <h2 class="section-title">Source Navigation Sample</h2>
              <div class="chips">
                ${(page.mappedLinks || []).slice(0, 18).map((link) => `
                  <a class="chip is-link" href="/clone/${link.id}" title="${link.href}">${link.title}</a>
                `).join("") || (page.sourceLinks || []).slice(0, 18).map((link) => {
                  const id = (link.split('/').pop() || 'link').replace(/[?&=#].*$/, '') || 'link';
                  return `<span class="chip">${id}</span>`;
                }).join("")}
              </div>
            </section>
          `;
        })
        .catch((error) => {
          app.textContent = "Failed to load clone page: " + String(error);
        });
    </script>
  </body>
</html>
